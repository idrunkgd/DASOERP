<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 2</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Badge de fraîcheur : signal visuel</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="90" width="380" height="60" rx="8" fill="#dcfce7"/><text x="60" y="115" font-size="12" font-weight="700" fill="#065f46">✓ Vérifié il y a 12j</text><text x="60" y="135" font-size="10" fill="#166534">Article confirmé conforme &lt; 90j</text><rect x="440" y="90" width="380" height="60" rx="8" fill="#fef3c7"/><text x="460" y="115" font-size="12" font-weight="700" fill="#78350f">⚠ À revoir (142j sans vérif)</text><text x="460" y="135" font-size="10" fill="#92400e">Considère la doc douteuse — vérifie avant d'agir</text><rect x="40" y="170" width="820" height="70" rx="8" fill="#eef2ff"/><text x="60" y="195" font-size="12" font-weight="700" fill="#5b5fd6">Rythme recommandé</text><text x="60" y="215" font-size="11" fill="#535679">✓ Après chaque feature merge : les 1-3 articles impactés</text><text x="60" y="232" font-size="11" fill="#535679">✓ 1× par trimestre : passer sur tous les articles orange restants</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Bouton "Marquer vérifié" en mode lecture reset le badge sans avoir à modifier le contenu.</text></svg>
