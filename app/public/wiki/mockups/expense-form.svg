<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="800" height="620" fill="#f3f3f7"/>
  <text x="30" y="40" font-size="22" font-weight="700" fill="#202037">Nouvelle note de frais</text>

  <rect x="30" y="60" width="740" height="530" rx="10" fill="#fff" stroke="#e1e1ec"/>

  <!-- Date + Catégorie -->
  <text x="50" y="95" font-size="11" font-weight="600" fill="#727496">DATE *</text>
  <rect x="50" y="102" width="200" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="126" font-size="12" fill="#202037">15/07/2026</text>

  <text x="280" y="95" font-size="11" font-weight="600" fill="#727496">CATÉGORIE *</text>
  <rect x="280" y="102" width="220" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="295" y="126" font-size="12" fill="#202037">Repas d'affaires</text>
  <text x="490" y="126" font-size="12" fill="#727496">▼</text>

  <text x="530" y="95" font-size="11" font-weight="600" fill="#727496">CENTRE DE COÛT *</text>
  <rect x="530" y="102" width="220" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="545" y="126" font-size="12" fill="#202037">CC-COMMERCIAL</text>

  <!-- Montants -->
  <text x="50" y="180" font-size="11" font-weight="600" fill="#727496">MONTANT TTC *</text>
  <rect x="50" y="187" width="200" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="211" font-size="14" font-weight="600" fill="#202037">78,50 €</text>

  <text x="280" y="180" font-size="11" font-weight="600" fill="#727496">TVA DÉDUITE (auto)</text>
  <rect x="280" y="187" width="220" height="36" rx="5" fill="#e1e1ec"/>
  <text x="295" y="211" font-size="12" fill="#535679">8,41 € (taux 12% Repas)</text>

  <!-- Description -->
  <text x="50" y="265" font-size="11" font-weight="600" fill="#727496">DESCRIPTION *</text>
  <rect x="50" y="272" width="700" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="296" font-size="12" fill="#202037">Déjeuner de préparation projet Client A</text>

  <!-- Participants (repas) -->
  <text x="50" y="345" font-size="11" font-weight="600" fill="#727496">PARTICIPANTS REPAS *</text>
  <text x="50" y="360" font-size="10" fill="#a1a1b8">Obligatoire pour les repas &gt; 30€</text>
  <rect x="50" y="368" width="700" height="60" rx="5" fill="#fff" stroke="#c2c3d6"/>

  <rect x="60" y="378" width="130" height="26" rx="13" fill="#e0e7ff"/>
  <text x="125" y="395" font-size="11" font-weight="500" fill="#3730a3" text-anchor="middle">Alice Martin (interne)</text>

  <rect x="200" y="378" width="150" height="26" rx="13" fill="#dbeafe"/>
  <text x="275" y="395" font-size="11" font-weight="500" fill="#1e40af" text-anchor="middle">Bob Client (Client A)</text>

  <rect x="360" y="378" width="180" height="26" rx="13" fill="#dbeafe"/>
  <text x="450" y="395" font-size="11" font-weight="500" fill="#1e40af" text-anchor="middle">Charlie Achats (Client A)</text>

  <!-- Justificatif -->
  <text x="50" y="465" font-size="11" font-weight="600" fill="#727496">JUSTIFICATIF (PDF ou image) *</text>
  <rect x="50" y="472" width="700" height="70" rx="8" fill="#fafafa" stroke="#c2c3d6" stroke-dasharray="4,4"/>
  <text x="400" y="505" font-size="12" font-weight="600" fill="#5b5fd6" text-anchor="middle">📎 ticket-restaurant.pdf</text>
  <text x="400" y="522" font-size="10" fill="#a1a1b8" text-anchor="middle">128 Ko · uploadé à l'instant</text>

  <!-- Boutons -->
  <rect x="380" y="565" width="120" height="36" rx="6" fill="#fff" stroke="#c2c3d6"/>
  <text x="440" y="588" font-size="12" fill="#535679" text-anchor="middle">Aperçu PDF</text>
  <rect x="510" y="565" width="110" height="36" rx="6" fill="#fff" stroke="#c2c3d6"/>
  <text x="565" y="588" font-size="12" fill="#535679" text-anchor="middle">Brouillon</text>
  <rect x="630" y="565" width="120" height="36" rx="6" fill="#5b5fd6"/>
  <text x="690" y="588" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Soumettre</text>
</svg>
