<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Assigner un test technique</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="14" font-weight="700" fill="#202037">/tests — Nouvelle assignation</text><text x="40" y="120" font-size="11" font-weight="600" fill="#727496">TEST</text><rect x="40" y="130" width="400" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/><text x="55" y="152" font-size="12" fill="#202037">IT — 30 questions · 45 min</text><text x="460" y="120" font-size="11" font-weight="600" fill="#727496">CANDIDAT / CONSULTANT</text><rect x="460" y="130" width="380" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/><text x="475" y="152" font-size="12" fill="#202037">Alicia Bernard (vivier)</text><rect x="40" y="180" width="820" height="80" rx="8" fill="#eef2ff"/><text x="60" y="205" font-size="12" font-weight="700" fill="#5b5fd6">4 tests disponibles</text><text x="60" y="225" font-size="11" fill="#535679">ELEC (30 Q) · PLC automatique (25 Q) · Data Manager (35 Q) · IT (30 Q)</text><text x="60" y="245" font-size="10" fill="#a1a1b8">Tu peux aussi créer un test libre (custom) avec tes propres questions.</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">L'assignation génère un lien avec token unique, sans besoin de compte utilisateur.</text></svg>
