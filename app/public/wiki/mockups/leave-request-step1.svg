<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1000" height="480" fill="#f3f3f7"/>

  <!-- Barre nav simulée -->
  <rect x="0" y="0" width="1000" height="50" fill="#fff" stroke="#e1e1ec"/>
  <text x="30" y="32" font-size="14" font-weight="600" fill="#202037">Dasohub</text>
  <text x="130" y="32" font-size="12" fill="#535679">Général  ·  CV  ·  <tspan font-weight="700" fill="#5b5fd6">RH ●</tspan></text>

  <text x="30" y="85" font-size="20" font-weight="700" fill="#202037">Mon espace</text>
  <text x="30" y="105" font-size="12" fill="#535679">Onglet RH → Congés</text>

  <!-- 4 cartes soldes -->
  <rect x="30" y="130" width="220" height="105" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="50" y="158" font-size="11" font-weight="600" fill="#727496">LÉGAUX</text>
  <text x="50" y="195" font-size="28" font-weight="700" fill="#5b5fd6">15,5</text>
  <text x="130" y="195" font-size="13" fill="#727496">/ 20 j</text>
  <text x="50" y="218" font-size="10" fill="#a1a1b8">4,5 j déjà pris</text>

  <rect x="260" y="130" width="220" height="105" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="280" y="158" font-size="11" font-weight="600" fill="#727496">RTT</text>
  <text x="280" y="195" font-size="28" font-weight="700" fill="#5b5fd6">10</text>
  <text x="335" y="195" font-size="13" fill="#727496">/ 12 j</text>
  <text x="280" y="218" font-size="10" fill="#a1a1b8">2 j déjà pris</text>

  <rect x="490" y="130" width="220" height="105" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="510" y="158" font-size="11" font-weight="600" fill="#727496">ANNÉE PRÉCÉDENTE</text>
  <text x="510" y="195" font-size="28" font-weight="700" fill="#f59e0b">3</text>
  <text x="545" y="195" font-size="13" fill="#727496">/ 3 j</text>
  <text x="510" y="218" font-size="10" fill="#a1a1b8">Reliquat 2025</text>

  <rect x="720" y="130" width="220" height="105" rx="10" fill="#5b5fd6"/>
  <text x="740" y="158" font-size="11" font-weight="600" fill="#c7d2fe">TOTAL DISPONIBLE</text>
  <text x="740" y="195" font-size="28" font-weight="700" fill="#fff">28,5 j</text>
  <text x="740" y="218" font-size="10" fill="#c7d2fe">Sur 35 j au total</text>

  <!-- Bouton nouvelle demande (highlight) -->
  <rect x="30" y="275" width="920" height="100" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="50" y="305" font-size="14" font-weight="600" fill="#202037">Mes demandes en cours</text>
  <text x="50" y="325" font-size="11" fill="#a1a1b8">Aucune demande en cours.</text>

  <!-- Bouton -->
  <rect x="795" y="298" width="140" height="36" rx="6" fill="#5b5fd6"/>
  <text x="865" y="321" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">+ Nouvelle demande</text>

  <!-- Flèche et badge étape -->
  <g>
    <rect x="20" y="70" width="120" height="26" rx="13" fill="#5b5fd6"/>
    <text x="80" y="87" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 5</text>
  </g>
  <text x="30" y="430" font-size="12" fill="#535679" font-style="italic">Tu arrives sur ton solde 2026. Clique sur <tspan font-weight="700" fill="#5b5fd6">+ Nouvelle demande</tspan> pour ouvrir le formulaire.</text>
</svg>
