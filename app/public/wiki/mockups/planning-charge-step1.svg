<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 2</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Header /users/[id] : charge hebdo affichée</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="95" font-size="20" font-weight="700" fill="#202037">Alice Martin</text><text x="40" y="120" font-size="12" fill="#535679">Charge planifiée semaine en cours :</text><rect x="40" y="140" width="400" height="80" rx="8" fill="#eef2ff" stroke="#5b5fd6" stroke-width="2"/><text x="60" y="175" font-size="36" font-weight="700" fill="#5b5fd6">32 h</text><text x="145" y="175" font-size="20" fill="#727496">/</text><text x="165" y="175" font-size="24" fill="#535679">38 h</text><text x="60" y="200" font-size="11" fill="#535679">→ 84% de charge · marge de 6h dispo</text><text x="470" y="170" font-size="12" font-weight="700" fill="#5b5fd6">Calcul auto :</text><text x="470" y="190" font-size="11" fill="#535679">Σ (PlanningEntry × charge %) sur semaine</text><text x="470" y="207" font-size="11" fill="#535679">Comparé à user.weeklyCapacityH (38h défaut)</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Vert = OK, orange &gt; 90%, rouge &gt; 100% (surcharge à investiguer).</text></svg>
