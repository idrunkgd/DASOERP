<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Taux journalier vendu vs coût interne</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="400" height="180" rx="8" fill="#dcfce7"/><text x="60" y="105" font-size="12" font-weight="700" fill="#065f46">TAUX JOURNALIER VENDU (dailyRate)</text><text x="60" y="135" font-size="32" font-weight="700" fill="#059669">625 €</text><text x="60" y="160" font-size="11" fill="#166534">HTVA · Affiché sur le CV PDF client</text><text x="60" y="180" font-size="11" fill="#166534">Suggéré par défaut lors d'une nouvelle proposition</text><text x="60" y="230" font-size="10" fill="#065f46" font-style="italic">Modifiable par l'utilisateur lui-même</text><rect x="460" y="80" width="400" height="180" rx="8" fill="#fef2f2" stroke="#ef4444"/><text x="480" y="105" font-size="12" font-weight="700" fill="#7f1d1d">COÛT INTERNE (dailyCost) — CONFIDENTIEL</text><text x="480" y="135" font-size="32" font-weight="700" fill="#dc2626">450 €</text><text x="480" y="160" font-size="11" fill="#991b1b">Ne s'affiche PAS sur le CV client</text><text x="480" y="180" font-size="11" fill="#991b1b">Utilisé pour calculer la marge en interne</text><text x="480" y="230" font-size="10" fill="#7f1d1d" font-style="italic">Uniquement modifiable par un admin</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Ne pas confondre : Rate = ce qu'on vend, Cost = ce que Dasolabs paie.</text></svg>
