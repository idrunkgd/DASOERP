<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="340" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 3</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Cliquer Export PDF — récap + justificatifs</text>

  <rect x="20" y="60" width="860" height="230" rx="10" fill="#fff" stroke="#e1e1ec"/>

  <rect x="600" y="80" width="260" height="46" rx="8" fill="#5b5fd6"/>
  <text x="730" y="108" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">📄 Export PDF comptable</text>

  <text x="40" y="105" font-size="13" font-weight="700" fill="#202037">Ce que génère le PDF</text>

  <rect x="40" y="140" width="820" height="120" rx="8" fill="#f9fafb" stroke="#e1e1ec"/>
  <text x="60" y="165" font-size="12" font-weight="700" fill="#5b5fd6">Page 1 — Récapitulatif</text>
  <text x="60" y="185" font-size="11" fill="#535679">• Tableau synthétique 12 notes (date, catégorie, TTC, TVA, CC)</text>
  <text x="60" y="203" font-size="11" fill="#535679">• Ventilation TVA par taux (6%, 12%, 21%, 21% déductible 50%)</text>
  <text x="60" y="221" font-size="11" fill="#535679">• Comptes comptables suggérés par catégorie</text>

  <text x="60" y="248" font-size="12" font-weight="700" fill="#5b5fd6">Pages 2-13 — Justificatifs</text>
  <text x="450" y="248" font-size="11" fill="#535679">Chaque ticket concaténé dans l'ordre du tableau</text>

  <text x="20" y="320" font-size="11" fill="#535679" font-style="italic">Un seul PDF de ~15 pages avec tout ce que le comptable a besoin de saisir.</text>
</svg>
