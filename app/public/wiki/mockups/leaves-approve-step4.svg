<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#ef4444"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Cas rare : supprimer un congé validé</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="85" width="820" height="70" rx="8" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="85" width="4" height="70" fill="#059669"/><text x="60" y="110" font-size="12" font-weight="600" fill="#202037">Charlie Petit — 10j du 15/12 au 31/12</text><text x="60" y="128" font-size="10" fill="#535679">APPROVED · Type : Année précédente</text><rect x="770" y="105" width="80" height="30" rx="4" fill="#fef2f2" stroke="#ef4444"/><text x="810" y="124" font-size="12" fill="#dc2626" text-anchor="middle">🗑</text><rect x="40" y="175" width="820" height="90" rx="8" fill="#fef2f2" stroke="#ef4444"/><text x="60" y="200" font-size="12" font-weight="700" fill="#7f1d1d">Confirmer la suppression</text><text x="60" y="220" font-size="11" fill="#991b1b">Supprimer la demande validée de Charlie Petit (10 j) ?</text><text x="60" y="240" font-size="11" font-weight="700" fill="#065f46">Les 10 jour(s) retourneront dans son compteur.</text><rect x="720" y="230" width="140" height="30" rx="6" fill="#ef4444"/><text x="790" y="250" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Confirmer</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Seuls managers/admins peuvent supprimer un APPROVED. Solde restauré auto.</text></svg>
