<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Ouvrir profil LinkedIn du candidat</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="400" height="180" rx="8" fill="#0a66c2"/><text x="60" y="105" font-size="13" font-weight="700" fill="#fff">LinkedIn</text><text x="60" y="125" font-size="10" fill="#c7d2fe">linkedin.com/in/diane-nouveau</text><rect x="60" y="140" width="360" height="100" rx="4" fill="#fff"/><text x="75" y="163" font-size="12" font-weight="700" fill="#202037">Diane Nouveau</text><text x="75" y="180" font-size="10" fill="#535679">Data Engineer chez Beta Corp</text><text x="75" y="200" font-size="10" fill="#535679">Bruxelles · 200+ relations</text><line x1="75" y1="210" x2="405" y2="210" stroke="#e1e1ec"/><text x="75" y="228" font-size="9" fill="#535679">Expérience · Formation · Compétences...</text><rect x="460" y="80" width="400" height="180" rx="8" fill="#eef2ff"/><text x="480" y="110" font-size="12" font-weight="700" fill="#5b5fd6">Assure-toi que le profil est déplié</text><text x="480" y="135" font-size="11" fill="#535679">✓ Clique "Voir plus" sur About</text><text x="480" y="155" font-size="11" fill="#535679">✓ Déplie chaque expérience (parfois masquée)</text><text x="480" y="175" font-size="11" fill="#535679">✓ Idem pour Formation</text><text x="480" y="205" font-size="11" font-weight="600" fill="#5b5fd6">Puis Cmd+A (ou Ctrl+A) pour tout sélectionner</text><text x="480" y="230" font-size="11" fill="#535679">Cmd+C pour copier — ne t'inquiète pas de la nav LinkedIn dans la copie.</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Le prompt Haiku ignore automatiquement la navigation et les profils suggérés.</text></svg>
