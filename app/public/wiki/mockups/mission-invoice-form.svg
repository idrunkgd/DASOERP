<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="800" height="550" fill="rgba(0,0,0,0.4)"/>
  <rect x="80" y="40" width="640" height="470" rx="12" fill="#fff"/>
  <text x="110" y="80" font-size="20" font-weight="700" fill="#202037">Générer tranche du mois</text>
  <text x="110" y="102" font-size="12" fill="#535679">Mission ACME 2026 · Alice Martin · Juillet 2026</text>

  <line x1="110" y1="120" x2="690" y2="120" stroke="#e1e1ec"/>

  <!-- Jours -->
  <text x="110" y="150" font-size="11" font-weight="600" fill="#727496">JOURS PRESTÉS</text>
  <rect x="110" y="160" width="120" height="40" rx="6" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="170" y="187" font-size="22" font-weight="700" fill="#202037" text-anchor="middle">22</text>
  <text x="245" y="187" font-size="11" fill="#727496">jours (auto-remplis depuis timesheet)</text>

  <!-- TJM -->
  <text x="110" y="240" font-size="11" font-weight="600" fill="#727496">TAUX JOURNALIER HT</text>
  <rect x="110" y="250" width="180" height="40" rx="6" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="180" y="277" font-size="16" font-weight="600" fill="#202037" text-anchor="middle">625,00 €</text>

  <!-- TVA -->
  <text x="320" y="240" font-size="11" font-weight="600" fill="#727496">TVA APPLIQUÉE</text>
  <rect x="320" y="250" width="180" height="40" rx="6" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="410" y="277" font-size="16" font-weight="600" fill="#202037" text-anchor="middle">21 %</text>

  <!-- Total HT -->
  <line x1="110" y1="320" x2="690" y2="320" stroke="#e1e1ec"/>
  <text x="110" y="350" font-size="12" fill="#535679">Montant HT (22 × 625)</text>
  <text x="690" y="350" font-size="16" font-weight="600" fill="#202037" text-anchor="end">13 750,00 €</text>

  <text x="110" y="378" font-size="12" fill="#535679">TVA</text>
  <text x="690" y="378" font-size="16" font-weight="600" fill="#202037" text-anchor="end">2 887,50 €</text>

  <rect x="110" y="395" width="580" height="45" fill="#f3f3f7"/>
  <text x="120" y="424" font-size="14" font-weight="700" fill="#202037">Total TTC</text>
  <text x="680" y="424" font-size="20" font-weight="700" fill="#5b5fd6" text-anchor="end">16 637,50 €</text>

  <!-- Date encaissement -->
  <text x="110" y="470" font-size="11" fill="#727496">Date d'encaissement prévue : <tspan font-weight="600" fill="#202037">31/08/2026</tspan> (fin mois + 30j)</text>

  <!-- Boutons -->
  <rect x="480" y="482" width="90" height="30" rx="6" fill="#fff" stroke="#c2c3d6"/>
  <text x="525" y="502" font-size="12" fill="#535679" text-anchor="middle">Annuler</text>
  <rect x="580" y="482" width="110" height="30" rx="6" fill="#5b5fd6"/>
  <text x="635" y="502" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Générer</text>
</svg>
