<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 3</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Le rituel post-merge en 5 min</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="24" height="24" rx="4" fill="#fff" stroke="#c2c3d6" stroke-width="2"/><text x="75" y="97" font-size="12" font-weight="600" fill="#202037">Le module modifié a-t-il un article wiki ?</text><text x="75" y="113" font-size="10" fill="#a1a1b8">Si non : en créer un via le seed, ou demander à un admin de le faire</text><rect x="40" y="130" width="24" height="24" rx="4" fill="#fff" stroke="#c2c3d6" stroke-width="2"/><text x="75" y="147" font-size="12" font-weight="600" fill="#202037">Les captures existantes correspondent-elles à l'UI actuelle ?</text><text x="75" y="163" font-size="10" fill="#a1a1b8">Sinon : refaire (5 min avec les bonnes pratiques)</text><rect x="40" y="180" width="24" height="24" rx="4" fill="#fff" stroke="#c2c3d6" stroke-width="2"/><text x="75" y="197" font-size="12" font-weight="600" fill="#202037">Un nouveau bouton / champ / workflow ?</text><text x="75" y="213" font-size="10" fill="#a1a1b8">Ajouter une étape numérotée dans l'article</text><rect x="40" y="230" width="24" height="24" rx="4" fill="#fff" stroke="#c2c3d6" stroke-width="2"/><text x="75" y="247" font-size="12" font-weight="600" fill="#202037">Un ancien élément supprimé ?</text><text x="75" y="263" font-size="10" fill="#a1a1b8">Retirer la mention dans le wiki (sinon confusion)</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">4 vérifs simples avant de fermer ta PR ou ton ticket.</text></svg>
