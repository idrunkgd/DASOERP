<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="340" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 3</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Approuvé → intégré au cashflow auto</text>

  <rect x="720" y="20" width="160" height="46" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="800" y="42" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">✓ Note approuvée</text>
  <text x="800" y="58" font-size="10" fill="#166534" text-anchor="middle">Alice Martin — 78,50 €</text>

  <rect x="20" y="80" width="860" height="230" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="40" y="108" font-size="13" font-weight="700" fill="#202037">Ce qui vient de se passer automatiquement</text>

  <g>
    <text x="40" y="145" font-size="11" font-weight="600" fill="#5b5fd6">1</text>
    <text x="60" y="145" font-size="12" fill="#202037">Statut de la note passe en <tspan font-family="monospace" fill="#059669">APPROVED</tspan></text>
  </g>
  <g>
    <text x="40" y="175" font-size="11" font-weight="600" fill="#5b5fd6">2</text>
    <text x="60" y="175" font-size="12" fill="#202037">Une entrée <tspan font-family="monospace" fill="#5b5fd6">OneOffCashflowEntry</tspan> est créée automatiquement :</text>
    <text x="70" y="195" font-size="11" fill="#535679">→ Catégorie : "Notes de frais"</text>
    <text x="70" y="212" font-size="11" fill="#535679">→ Montant : 78,50 € (dépense)</text>
    <text x="70" y="229" font-size="11" fill="#535679">→ Date : 31/07/2026 (fin du mois de la dépense)</text>
    <text x="70" y="246" font-size="11" fill="#535679">→ Lien : ExpenseReport.id (pas de doublon possible)</text>
  </g>
  <g>
    <text x="40" y="275" font-size="11" font-weight="600" fill="#5b5fd6">3</text>
    <text x="60" y="275" font-size="12" fill="#202037">Alice reçoit une notif "Note approuvée, remboursement au prochain payroll"</text>
  </g>

  <text x="20" y="330" font-size="11" fill="#535679" font-style="italic">Un clic sur ✓ = 3 actions automatiques. Pas de saisie manuelle du cashflow, pas d'oubli.</text>
</svg>
