<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="380" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 4</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Phase 1 : la demande client — MissionRequest</text>

  <rect x="20" y="60" width="860" height="290" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="40" y="90" font-size="14" font-weight="700" fill="#202037">MissionRequest MRQ-2026-042</text>

  <rect x="40" y="110" width="820" height="90" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="60" y="135" font-size="12" font-weight="700" fill="#1e3a8a">Client A — Backend TypeScript senior</text>
  <text x="60" y="155" font-size="11" fill="#1e40af">📅 Démarrage : septembre 2026 · Durée : 6 mois</text>
  <text x="60" y="175" font-size="11" fill="#1e40af">💰 TJM cible : 650 € · 🎯 Skills : Node.js, PostgreSQL, AWS</text>
  <text x="60" y="192" font-size="10" fill="#1e40af">Contact : Bob Client (CTO Client A) · Créée le 15/07/2026</text>

  <rect x="40" y="215" width="820" height="120" rx="8" fill="#fefce8"/>
  <text x="60" y="240" font-size="12" font-weight="700" fill="#78350f">Ce qu'il faut savoir sur MissionRequest</text>
  <text x="60" y="265" font-size="11" fill="#92400e">• C'est une DEMANDE, pas un contrat. Pipeline CRM au stade "Qualif".</text>
  <text x="60" y="285" font-size="11" fill="#92400e">• Un client peut demander plusieurs profils sur une même MissionRequest.</text>
  <text x="60" y="305" font-size="11" fill="#92400e">• Ne compte PAS dans le KPI "Missions ouvertes" du dashboard.</text>
  <text x="60" y="325" font-size="11" fill="#92400e">• Passe en OFFER_SENT quand tu envoies un proposal → puis SELECTED = Mission.</text>

  <text x="20" y="370" font-size="11" fill="#535679" font-style="italic">Toute mission commence par une MissionRequest. C'est l'entrée du funnel commercial.</text>
</svg>
