<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="350" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 3</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Structure : 12 colonnes × N lignes de flux</text>

  <rect x="20" y="60" width="860" height="230" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="20" y="60" width="200" height="230" fill="#f3f3f7"/>
  <text x="35" y="90" font-size="11" font-weight="700" fill="#5b5fd6">LIGNES = flux financier</text>
  <text x="35" y="115" font-size="10" fill="#535679">• Mission client (agrégée par mois)</text>
  <text x="35" y="132" font-size="10" fill="#535679">• Dépense récurrente (loyer, compta)</text>
  <text x="35" y="149" font-size="10" fill="#535679">• Entrée ponctuelle (subside, TVA)</text>
  <text x="35" y="166" font-size="10" fill="#535679">• Payroll (3 lignes : NET, précompte, ONSS)</text>
  <text x="35" y="183" font-size="10" fill="#535679">• Simulation (recette non contractée)</text>

  <text x="240" y="90" font-size="11" font-weight="700" fill="#5b5fd6">COLONNES = 12 mois de l'année</text>
  <g font-size="9" fill="#727496" text-anchor="middle">
    <text x="270" y="115">Jan</text><text x="315" y="115">Fév</text><text x="360" y="115">Mar</text>
    <text x="405" y="115">Avr</text><text x="450" y="115">Mai</text><text x="495" y="115">Juin</text>
    <text x="540" y="115">Juil</text><text x="585" y="115">Aoû</text><text x="630" y="115">Sep</text>
    <text x="675" y="115">Oct</text><text x="720" y="115">Nov</text><text x="765" y="115">Déc</text>
  </g>

  <text x="240" y="150" font-size="11" font-weight="700" fill="#5b5fd6">CELLULES = montant × statut coloré</text>
  <g>
    <rect x="240" y="165" width="60" height="24" fill="#f3f3f7"/>
    <text x="270" y="180" font-size="10" fill="#535679" text-anchor="middle">PLANNED</text>
    <rect x="310" y="165" width="60" height="24" fill="#dbeafe"/>
    <text x="340" y="180" font-size="10" fill="#1e40af" text-anchor="middle">INVOICED</text>
    <rect x="380" y="165" width="60" height="24" fill="#dcfce7"/>
    <text x="410" y="180" font-size="10" fill="#166534" text-anchor="middle">PAID</text>
    <text x="460" y="180" font-size="10" fill="#a1a1b8">Gris = prévu, bleu = facturé, vert = payé</text>
  </g>

  <text x="240" y="230" font-size="11" font-weight="700" fill="#5b5fd6">Solde compte (KPI en tête)</text>
  <text x="240" y="248" font-size="11" fill="#535679">= trésorerie RÉELLE aujourd'hui</text>
  <text x="240" y="264" font-size="11" fill="#535679">= bootstrap manuel + tous PAID historiques</text>

  <text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Ne confonds pas Solde compte (banque réelle) avec Solde année (projection fin décembre).</text>
</svg>
