<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 2</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Après chaque feature merge : la règle</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="820" height="70" rx="8" fill="#eef2ff" stroke="#5b5fd6" stroke-width="2"/><text x="60" y="105" font-size="13" font-weight="700" fill="#5b5fd6">La règle en 1 phrase</text><text x="60" y="128" font-size="12" font-weight="600" fill="#202037">Toute modification visible côté user = update du wiki dans le même sprint.</text><text x="40" y="180" font-size="12" font-weight="700" fill="#059669">✓ Ça compte comme "visible utilisateur" :</text><text x="55" y="202" font-size="11" fill="#535679">• Nouveau champ, nouveau bouton, nouvelle page, nouveau workflow</text><text x="55" y="220" font-size="11" fill="#535679">• Changement de wording, réorganisation menu, nouveau statut</text><text x="55" y="238" font-size="11" fill="#535679">• Changement de règle métier (quotas, seuils, calculs)</text><text x="40" y="270" font-size="12" font-weight="700" fill="#ef4444">✗ NE compte PAS :</text><text x="55" y="292" font-size="11" fill="#535679">Refactor interne, tests, perf, migrations DB sans impact UI</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Un wiki obsolète cause plus de tort qu'un wiki manquant. Discipline > exhaustivité.</text></svg>
