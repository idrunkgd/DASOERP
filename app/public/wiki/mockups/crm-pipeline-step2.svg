<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="340" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 3</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Drag &amp; drop pour changer de stade</text>
  <rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="40" y="90" width="200" height="140" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
  <text x="55" y="115" font-size="11" font-weight="700" fill="#1e40af">Qualif</text>
  <rect x="55" y="125" width="170" height="80" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="65" y="145" font-size="11" font-weight="600" fill="#202037">Delta SA</text>
  <text x="65" y="160" font-size="9" fill="#535679">Data platform</text>
  <text x="65" y="177" font-size="9" fill="#a1a1b8">85 K€ · Eve Delta</text>
  <text x="65" y="197" font-size="8" fill="#a1a1b8" font-style="italic">↕ Glisser vers...</text>
  <path d="M 250 165 L 340 165" stroke="#5b5fd6" stroke-width="3" fill="none" stroke-dasharray="6,4" marker-end="url(#arrCRM)"/>
  <defs>
    <marker id="arrCRM" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#5b5fd6"/>
    </marker>
  </defs>
  <rect x="360" y="90" width="200" height="140" rx="8" fill="#faf5ff" stroke="#8b5cf6"/>
  <text x="375" y="115" font-size="11" font-weight="700" fill="#7c2d12">Devis</text>
  <rect x="375" y="125" width="170" height="80" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <text x="385" y="145" font-size="11" font-weight="600" fill="#065f46">Delta SA (déposée ici)</text>
  <text x="385" y="163" font-size="9" fill="#166534">Data platform · 85 K€</text>
  <text x="385" y="180" font-size="9" fill="#059669" font-style="italic">✓ Stade mis à jour</text>
  <text x="600" y="150" font-size="11" fill="#535679">L'ERP écrit le champ</text>
  <text x="600" y="167" font-size="10" font-family="monospace" fill="#5b5fd6">crmStage = 'DEVIS'</text>
  <text x="600" y="187" font-size="10" fill="#535679">sur la MissionRequest ou l'Offer.</text>
  <text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Le stade CRM est distinct du statut interne (offre SENT peut être en stade Négo).</text>
