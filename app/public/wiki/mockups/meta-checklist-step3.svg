<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 3</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Retour utilisateur = signal (à écouter)</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="85" width="820" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/><text x="60" y="110" font-size="12" font-weight="700" fill="#78350f">💬 Signal utilisateur</text><text x="60" y="132" font-size="12" fill="#92400e">Un consultant : "j'ai suivi la doc mais ça marche pas"</text><text x="60" y="150" font-size="11" fill="#92400e">C'est un SIGNAL — l'article est probablement obsolète.</text><text x="60" y="168" font-size="11" font-weight="700" fill="#7f1d1d">→ Corrige immédiatement, avant qu'un 2e vienne se plaindre.</text><text x="40" y="205" font-size="12" font-weight="700" fill="#059669">Refonte majeure ? Recommence à zéro</text><text x="55" y="227" font-size="11" fill="#535679">Si tu refais complètement un module (ex: refonte cashflow) :</text><text x="55" y="247" font-size="11" fill="#535679">1. Crée les nouveaux articles dans le seed (captures fraîches)</text><text x="55" y="265" font-size="11" fill="#535679">2. Nullifie publishedAt des anciens (accessible côté DB)</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">L'édition incrémentale d'un article devenu incompréhensible = pire que la refonte.</text></svg>
