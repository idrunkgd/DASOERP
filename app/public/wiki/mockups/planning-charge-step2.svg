<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#f59e0b"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 2</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Sur-affectation détectée</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="820" height="110" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/><text x="60" y="105" font-size="13" font-weight="700" fill="#78350f">⚠ Bob Durant — Charge : 76 h / 38 h (200 %)</text><text x="60" y="128" font-size="11" fill="#92400e">Bob est affecté à 100 % sur Projet ACME ET 100 % sur Projet Beta ce mois-ci.</text><text x="60" y="146" font-size="11" fill="#92400e">Les 2 cellules restent affichées en superposition — l'ERP ne bloque pas mais alerte.</text><text x="60" y="168" font-size="11" font-weight="700" fill="#7f1d1d">Action : arbitrer avec les 2 PM ou étaler dans le temps.</text><text x="40" y="220" font-size="12" font-weight="700" fill="#5b5fd6">Bonnes pratiques :</text><text x="55" y="242" font-size="11" fill="#535679">• Utiliser charge 50% + 50% quand c'est un vrai temps partagé</text><text x="55" y="260" font-size="11" fill="#535679">• Regarder la charge avant d'accepter une nouvelle mission</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">La sur-affectation reste visuelle — pas de règle de blocage automatique.</text></svg>
