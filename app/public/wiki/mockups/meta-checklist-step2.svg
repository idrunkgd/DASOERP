<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 3</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Nouvel article ou éditer existant ?</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="400" height="180" rx="8" fill="#dcfce7"/><text x="60" y="105" font-size="13" font-weight="700" fill="#065f46">Créer un NOUVEL article</text><text x="60" y="130" font-size="11" fill="#166534">Quand tu introduis :</text><text x="60" y="150" font-size="11" fill="#535679">• Un nouveau flux complet (workflow inédit)</text><text x="60" y="170" font-size="11" fill="#535679">• Un nouvel écran avec sa propre logique</text><text x="60" y="190" font-size="11" fill="#535679">• Un cas d'usage récurrent à documenter</text><text x="60" y="230" font-size="10" fill="#065f46" font-style="italic">Ajoute-le dans seed-wiki.ts ou demande à un admin</text><rect x="460" y="80" width="400" height="180" rx="8" fill="#eef2ff"/><text x="480" y="105" font-size="13" font-weight="700" fill="#5b5fd6">MODIFIER un article existant</text><text x="480" y="130" font-size="11" fill="#535679">Quand tu :</text><text x="480" y="150" font-size="11" fill="#535679">• Ajoutes un champ/bouton à quelque chose existant</text><text x="480" y="170" font-size="11" fill="#535679">• Changes un wording, un statut, un label</text><text x="480" y="190" font-size="11" fill="#535679">• Ajustes une règle métier existante</text><text x="480" y="230" font-size="10" fill="#5b5fd6" font-style="italic">Édite en ligne via le bouton "Modifier" (admin uniquement)</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">80% des cas = modif d'article existant. Nouveau article = flux vraiment inédit.</text></svg>
