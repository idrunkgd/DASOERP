<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="340" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 5</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Montant TTC — calcul automatique HT/TVA</text>

  <rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/>

  <text x="40" y="90" font-size="11" font-weight="600" fill="#727496">MONTANT TTC * (ce que tu as payé)</text>
  <rect x="40" y="98" width="240" height="46" rx="4" fill="#fff" stroke="#10b981" stroke-width="2"/>
  <text x="55" y="128" font-size="20" font-weight="700" fill="#059669">78,50 €</text>
  <text x="260" y="128" font-size="12" fill="#10b981">✓</text>

  <rect x="320" y="98" width="530" height="150" rx="8" fill="#eef2ff" stroke="#5b5fd6"/>
  <text x="345" y="122" font-size="12" font-weight="700" fill="#5b5fd6">Décomposition automatique</text>

  <text x="345" y="150" font-size="11" fill="#535679">Montant TTC saisi</text>
  <text x="820" y="150" font-size="12" font-weight="600" fill="#202037" text-anchor="end">78,50 €</text>

  <text x="345" y="175" font-size="11" fill="#535679">TVA 12% déduite</text>
  <text x="820" y="175" font-size="12" font-weight="600" fill="#5b5fd6" text-anchor="end">−8,41 €</text>

  <line x1="345" y1="188" x2="820" y2="188" stroke="#c2c3d6"/>

  <text x="345" y="212" font-size="12" font-weight="700" fill="#202037">Montant HT (imputé au CC)</text>
  <text x="820" y="212" font-size="14" font-weight="700" fill="#202037" text-anchor="end">70,09 €</text>

  <text x="345" y="235" font-size="10" fill="#a1a1b8" font-style="italic">La TVA sera récupérée par la compta trimestriellement</text>

  <text x="20" y="315" font-size="11" fill="#535679" font-style="italic">Tu ne saisis QUE le TTC (celui sur le ticket). Le HT et la TVA se calculent tout seuls.</text>
</svg>
