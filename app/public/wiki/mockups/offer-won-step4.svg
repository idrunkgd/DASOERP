<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="340" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 4</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Différence Project vs Mission — ne pas confondre</text>
  <rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="40" y="80" width="400" height="180" rx="8" fill="#eef2ff"/>
  <text x="60" y="105" font-size="13" font-weight="700" fill="#5b5fd6">Project</text>
  <text x="60" y="130" font-size="11" fill="#535679">Chantier à durée finie avec livrables :</text>
  <text x="60" y="150" font-size="11" fill="#535679">• Dev, formation, audit, refonte...</text>
  <text x="60" y="170" font-size="11" fill="#535679">• Prix forfaitaire ou par jalon</text>
  <text x="60" y="190" font-size="11" fill="#535679">• Tranches définies à la signature</text>
  <text x="60" y="220" font-size="10" fill="#a1a1b8" font-style="italic">Exemple : "Refonte ERP 3 mois — 45 K€"</text>
  <rect x="460" y="80" width="400" height="180" rx="8" fill="#fef3c7"/>
  <text x="480" y="105" font-size="13" font-weight="700" fill="#78350f">Mission</text>
  <text x="480" y="130" font-size="11" fill="#92400e">Consultant loué en TJM :</text>
  <text x="480" y="150" font-size="11" fill="#92400e">• Volume horaire, pas de livrable défini</text>
  <text x="480" y="170" font-size="11" fill="#92400e">• Facturation mensuelle (jours × TJM)</text>
  <text x="480" y="190" font-size="11" fill="#92400e">• Durée souvent extensible</text>
  <text x="480" y="220" font-size="10" fill="#a1a1b8" font-style="italic">Exemple : "Alice sur Client A · 625 €/j"</text>
  <text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Un Project PEUT inclure des Missions (consultants sur le chantier). Distinction sémantique importante.</text>
</svg>
