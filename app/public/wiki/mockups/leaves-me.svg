<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 550" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1000" height="550" fill="#f3f3f7"/>
  <text x="30" y="35" font-size="20" font-weight="700" fill="#202037">Mon espace — Congés 2026</text>
  <text x="30" y="55" font-size="12" fill="#535679">Ton solde annuel et tes demandes</text>

  <!-- 4 cartes soldes -->
  <rect x="30" y="80" width="230" height="115" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="50" y="110" font-size="11" font-weight="600" fill="#727496">LÉGAUX</text>
  <text x="50" y="150" font-size="32" font-weight="700" fill="#5b5fd6">15,5</text>
  <text x="130" y="150" font-size="14" fill="#727496">/ 20 j</text>
  <text x="50" y="175" font-size="10" fill="#a1a1b8">4,5 j déjà pris</text>

  <rect x="270" y="80" width="230" height="115" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="290" y="110" font-size="11" font-weight="600" fill="#727496">RTT</text>
  <text x="290" y="150" font-size="32" font-weight="700" fill="#5b5fd6">10</text>
  <text x="345" y="150" font-size="14" fill="#727496">/ 12 j</text>
  <text x="290" y="175" font-size="10" fill="#a1a1b8">2 j déjà pris</text>

  <rect x="510" y="80" width="230" height="115" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="530" y="110" font-size="11" font-weight="600" fill="#727496">ANNÉE PRÉCÉDENTE</text>
  <text x="530" y="150" font-size="32" font-weight="700" fill="#f59e0b">3</text>
  <text x="565" y="150" font-size="14" fill="#727496">/ 3 j</text>
  <text x="530" y="175" font-size="10" fill="#a1a1b8">Reliquat 2025</text>

  <rect x="750" y="80" width="220" height="115" rx="10" fill="#5b5fd6"/>
  <text x="770" y="110" font-size="11" font-weight="600" fill="#c7d2fe">TOTAL DISPONIBLE</text>
  <text x="770" y="150" font-size="32" font-weight="700" fill="#fff">28,5 j</text>
  <text x="770" y="175" font-size="10" fill="#c7d2fe">Sur 35 j au total</text>

  <!-- Form demande -->
  <text x="30" y="235" font-size="16" font-weight="700" fill="#202037">Nouvelle demande</text>
  <rect x="30" y="245" width="940" height="270" rx="10" fill="#fff" stroke="#e1e1ec"/>

  <text x="50" y="275" font-size="11" font-weight="600" fill="#727496">DU</text>
  <rect x="50" y="282" width="180" height="34" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="304" font-size="12" fill="#202037">10/08/2026</text>

  <text x="250" y="275" font-size="11" font-weight="600" fill="#727496">AU</text>
  <rect x="250" y="282" width="180" height="34" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="265" y="304" font-size="12" fill="#202037">21/08/2026</text>

  <text x="450" y="275" font-size="11" font-weight="600" fill="#727496">JOURS OUVRÉS</text>
  <rect x="450" y="282" width="100" height="34" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="500" y="304" font-size="14" font-weight="600" fill="#202037" text-anchor="middle">10</text>

  <text x="570" y="275" font-size="11" font-weight="600" fill="#727496">TYPE</text>
  <rect x="570" y="282" width="180" height="34" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="585" y="304" font-size="12" fill="#202037">Légaux (ANNUAL)</text>

  <!-- Mission client -->
  <rect x="50" y="335" width="900" height="90" rx="8" fill="#fef3c7" stroke="#fcd34d"/>
  <text x="70" y="360" font-size="12" font-weight="600" fill="#78350f">Tu es actuellement en mission chez Client A</text>
  <rect x="70" y="375" width="16" height="16" rx="3" fill="#fff" stroke="#78350f" stroke-width="2"/>
  <path d="M 73 383 L 78 388 L 84 378" stroke="#78350f" stroke-width="2" fill="none"/>
  <text x="98" y="388" font-size="12" fill="#78350f">Demandé chez le client et accordé</text>
  <text x="98" y="405" font-size="11" fill="#92400e">Coche uniquement si le PM du client a validé de son côté</text>

  <!-- Bouton -->
  <rect x="820" y="465" width="130" height="36" rx="6" fill="#5b5fd6"/>
  <text x="885" y="488" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Soumettre</text>
</svg>
