<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 5</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Quotas congés — personnalisables par user</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Quotas congés annuels</text><text x="40" y="130" font-size="11" font-weight="600" fill="#727496">LÉGAUX (défaut BE = 20j)</text><rect x="40" y="138" width="200" height="42" rx="4" fill="#eef2ff" stroke="#5b5fd6" stroke-width="2"/><text x="140" y="167" font-size="20" font-weight="700" fill="#5b5fd6" text-anchor="middle">20</text><text x="260" y="130" font-size="11" font-weight="600" fill="#727496">RTT (défaut = 12j)</text><rect x="260" y="138" width="200" height="42" rx="4" fill="#eef2ff" stroke="#5b5fd6" stroke-width="2"/><text x="360" y="167" font-size="20" font-weight="700" fill="#5b5fd6" text-anchor="middle">12</text><rect x="40" y="200" width="820" height="60" rx="8" fill="#fef3c7"/><text x="60" y="225" font-size="12" font-weight="700" fill="#78350f">Cas particuliers</text><text x="60" y="245" font-size="11" fill="#92400e">• Ancienneté : contrat &gt; 5 ans peut avoir 25j légaux (à saisir manuellement)</text><text x="60" y="260" font-size="11" fill="#92400e">• Freelance : 0 légaux + 0 RTT (rappel : pas d'obligation légale)</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Ces quotas seront la base des rollovers annuels. Modifiables sur la fiche user à tout moment.</text></svg>
