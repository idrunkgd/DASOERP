<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="380" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 5</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Choisir catégorie — la TVA se déduit auto</text>

  <rect x="20" y="60" width="860" height="290" rx="10" fill="#fff" stroke="#e1e1ec"/>

  <text x="40" y="90" font-size="11" font-weight="600" fill="#727496">CATÉGORIE *</text>
  <rect x="40" y="98" width="240" height="36" rx="4" fill="#fff" stroke="#5b5fd6" stroke-width="2"/>
  <text x="55" y="122" font-size="12" font-weight="600" fill="#5b5fd6">Repas d'affaires</text>
  <text x="265" y="122" font-size="10" fill="#5b5fd6">▲</text>

  <!-- Dropdown ouvert -->
  <rect x="40" y="138" width="240" height="180" rx="4" fill="#fff" stroke="#e1e1ec" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
  <rect x="40" y="138" width="240" height="32" fill="#eef2ff"/>
  <text x="55" y="159" font-size="12" font-weight="600" fill="#5b5fd6">✓ Repas d'affaires (TVA 12%)</text>
  <text x="55" y="184" font-size="12" fill="#535679">Hébergement (TVA 6%)</text>
  <text x="55" y="208" font-size="12" fill="#535679">Déplacement (TVA 21%)</text>
  <text x="55" y="232" font-size="12" fill="#535679">Voiture — carburant (TVA 21% déductible 50%)</text>
  <text x="55" y="256" font-size="12" fill="#535679">Fournitures bureau (TVA 21%)</text>
  <text x="55" y="280" font-size="12" fill="#535679">Autre</text>
  <text x="55" y="304" font-size="12" fill="#535679">Formation (TVA 21% ou exonéré)</text>

  <rect x="320" y="98" width="240" height="80" rx="8" fill="#dcfce7" stroke="#059669"/>
  <text x="340" y="122" font-size="11" font-weight="700" fill="#065f46">💡 TVA appliquée</text>
  <text x="340" y="145" font-size="20" font-weight="700" fill="#059669">12 %</text>
  <text x="340" y="167" font-size="10" fill="#166534">Repas d'affaires — taux légal belge</text>

  <text x="600" y="98" font-size="11" font-weight="700" fill="#78350f">⚠ Attention voitures</text>
  <text x="600" y="120" font-size="11" fill="#92400e">Carburant + parking + péages :</text>
  <text x="600" y="138" font-size="11" fill="#92400e">TVA 21% mais déduction limitée à 50%</text>
  <text x="600" y="156" font-size="11" fill="#92400e">(règle voitures particulières BE).</text>
  <text x="600" y="180" font-size="11" fill="#92400e">L'ERP applique automatiquement.</text>

  <text x="20" y="365" font-size="11" fill="#535679" font-style="italic">La TVA se déduit du TTC selon la catégorie. Tu ne saisis QUE le TTC visible sur le ticket.</text>
</svg>
