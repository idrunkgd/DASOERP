<rect x="40" y="235" width="820" height="30" fill="#fef2f2"/>
<text x="55" y="255" font-size="11" font-weight="700" fill="#7f1d1d">Payroll — ONSS</text>
<text x="800" y="255" font-size="12" font-weight="700" fill="#dc2626" text-anchor="end">-4 500 €</text>

<text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Les 3 lignes cashflow sont pré-remplies chaque mois — pas de double saisie.</text>
