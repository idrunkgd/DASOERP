<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1200" height="400" fill="#f3f3f7"/>
  <text x="40" y="50" fill="#202037" font-size="24" font-weight="700">Tableau de bord</text>
  <text x="40" y="72" fill="#535679" font-size="13">Vue synthétique de l'activité</text>

  <!-- KPI 1 : Missions ouvertes -->
  <rect x="40" y="110" width="260" height="130" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="40" y="110" width="4" height="130" rx="2" fill="#5b5fd6"/>
  <text x="64" y="140" fill="#535679" font-size="12" font-weight="500">MISSIONS OUVERTES</text>
  <text x="64" y="185" fill="#202037" font-size="42" font-weight="700">4</text>
  <text x="64" y="215" fill="#727496" font-size="12">PLANNED · ACTIVE · EXTENDED</text>

  <!-- KPI 2 : CA prévu -->
  <rect x="320" y="110" width="260" height="130" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="320" y="110" width="4" height="130" rx="2" fill="#10b981"/>
  <text x="344" y="140" fill="#535679" font-size="12" font-weight="500">CA PRÉVU 2026</text>
  <text x="344" y="185" fill="#202037" font-size="42" font-weight="700">840 K€</text>
  <text x="344" y="215" fill="#727496" font-size="12">Toutes tranches non-annulées</text>

  <!-- KPI 3 : Solde compte -->
  <rect x="600" y="110" width="260" height="130" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="600" y="110" width="4" height="130" rx="2" fill="#0ea5e9"/>
  <text x="624" y="140" fill="#535679" font-size="12" font-weight="500">SOLDE COMPTE</text>
  <text x="624" y="185" fill="#202037" font-size="42" font-weight="700">62 300 €</text>
  <text x="624" y="215" fill="#727496" font-size="12">Bootstrap + PAID historique</text>

  <!-- KPI 4 : Notes à approuver -->
  <rect x="880" y="110" width="260" height="130" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="880" y="110" width="4" height="130" rx="2" fill="#f59e0b"/>
  <text x="904" y="140" fill="#535679" font-size="12" font-weight="500">NOTES À APPROUVER</text>
  <text x="904" y="185" fill="#202037" font-size="42" font-weight="700">3</text>
  <text x="904" y="215" fill="#727496" font-size="12">SUBMITTED en attente</text>

  <!-- Alertes -->
  <text x="40" y="290" fill="#202037" font-size="16" font-weight="600">Actions du jour</text>
  <rect x="40" y="305" width="360" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5"/>
  <circle cx="65" cy="335" r="6" fill="#ef4444"/>
  <text x="85" y="330" fill="#7f1d1d" font-size="13" font-weight="600">Note de frais bloquée</text>
  <text x="85" y="350" fill="#991b1b" font-size="11">Alice — 245€ · reçu manquant</text>

  <rect x="420" y="305" width="360" height="60" rx="8" fill="#fffbeb" stroke="#fcd34d"/>
  <circle cx="445" cy="335" r="6" fill="#f59e0b"/>
  <text x="465" y="330" fill="#78350f" font-size="13" font-weight="600">Milestone à facturer</text>
  <text x="465" y="350" fill="#92400e" font-size="11">Projet A — tranche mars échue</text>

  <rect x="800" y="305" width="360" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <circle cx="825" cy="335" r="6" fill="#3b82f6"/>
  <text x="845" y="330" fill="#1e3a8a" font-size="13" font-weight="600">2 nouveaux candidats</text>
  <text x="845" y="350" fill="#1e40af" font-size="11">À trier dans le vivier</text>
</svg>
