<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="380" fill="rgba(0,0,0,0.5)"/><rect x="150" y="60" width="600" height="280" rx="12" fill="#fff"/><rect x="20" y="20" width="110" height="24" rx="12" fill="#ef4444"/><text x="75" y="36" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 4</text><text x="180" y="100" font-size="16" font-weight="700" fill="#202037">Refuser Bob — motif obligatoire</text><text x="180" y="130" font-size="11" fill="#535679">Bob Durant · 1j le 05/09 · RTT</text><text x="180" y="170" font-size="10" font-weight="600" fill="#727496">MOTIF DU REFUS *</text><rect x="180" y="180" width="540" height="80" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/><text x="195" y="205" font-size="12" fill="#202037">Impossible cette semaine — release Client A prévue.</text><text x="195" y="225" font-size="12" fill="#202037">Peux-tu reprogrammer semaine du 12/09 ?</text><text x="180" y="285" font-size="10" fill="#a1a1b8" font-style="italic">Bob recevra ce motif et pourra resoumettre.</text><rect x="580" y="295" width="140" height="30" rx="6" fill="#ef4444"/><text x="650" y="315" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Confirmer refus</text><text x="180" y="370" font-size="11" fill="#fff" font-style="italic">Un refus sans motif = frustration. Sois explicite pour que le consultant comprenne et resoumette.</text></svg>
