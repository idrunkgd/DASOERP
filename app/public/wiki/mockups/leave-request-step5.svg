<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1000" height="480" fill="#f3f3f7"/>

  <!-- Toast succès en haut à droite -->
  <rect x="720" y="20" width="260" height="60" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/>
  <circle cx="745" cy="50" r="12" fill="#059669"/>
  <path d="M 738 50 L 743 55 L 752 44" stroke="#fff" stroke-width="2.5" fill="none"/>
  <text x="770" y="45" font-size="12" font-weight="700" fill="#065f46">Demande soumise ✓</text>
  <text x="770" y="63" font-size="10" fill="#166534">Statut : SUBMITTED · Manager notifié</text>

  <text x="30" y="115" font-size="20" font-weight="700" fill="#202037">Mon espace</text>
  <text x="30" y="135" font-size="12" fill="#535679">Onglet RH → Congés</text>

  <!-- Solde impacté -->
  <rect x="30" y="160" width="220" height="80" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="50" y="185" font-size="10" font-weight="600" fill="#727496">LÉGAUX</text>
  <text x="50" y="215" font-size="22" font-weight="700" fill="#5b5fd6">15,5</text>
  <text x="115" y="215" font-size="11" fill="#727496">/ 20 j</text>
  <text x="50" y="232" font-size="9" fill="#f59e0b" font-style="italic">−10 j en attente</text>

  <rect x="260" y="160" width="220" height="80" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="280" y="185" font-size="10" font-weight="600" fill="#727496">TOTAL RESTANT</text>
  <text x="280" y="215" font-size="22" font-weight="700" fill="#202037">18,5 j</text>
  <text x="280" y="232" font-size="9" fill="#a1a1b8">Si demande approuvée</text>

  <!-- Tableau de mes demandes avec nouvelle ligne -->
  <text x="30" y="280" font-size="14" font-weight="600" fill="#202037">Mes demandes</text>
  <rect x="30" y="295" width="940" height="140" rx="10" fill="#fff" stroke="#e1e1ec"/>

  <rect x="30" y="295" width="940" height="34" fill="#f3f3f7"/>
  <text x="50" y="317" font-size="11" font-weight="600" fill="#727496">DATES</text>
  <text x="280" y="317" font-size="11" font-weight="600" fill="#727496">TYPE</text>
  <text x="440" y="317" font-size="11" font-weight="600" fill="#727496">JOURS</text>
  <text x="580" y="317" font-size="11" font-weight="600" fill="#727496">STATUT</text>
  <text x="780" y="317" font-size="11" font-weight="600" fill="#727496">CLIENT</text>

  <!-- Nouvelle ligne surlignée -->
  <rect x="30" y="329" width="940" height="50" fill="#eef2ff"/>
  <text x="50" y="355" font-size="12" font-weight="600" fill="#202037">10/08 → 21/08/2026</text>
  <text x="50" y="370" font-size="10" fill="#5b5fd6">Créée à l'instant</text>
  <text x="280" y="360" font-size="12" fill="#535679">Légaux</text>
  <text x="440" y="360" font-size="12" font-weight="600" fill="#202037">10 j</text>
  <rect x="570" y="343" width="130" height="22" rx="3" fill="#fef3c7"/>
  <text x="635" y="358" font-size="11" font-weight="700" fill="#92400e" text-anchor="middle">⏳ En attente</text>
  <text x="780" y="360" font-size="12" fill="#059669">✓ client OK</text>

  <g>
    <rect x="20" y="70" width="120" height="26" rx="13" fill="#059669"/>
    <text x="80" y="87" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 5 / 5</text>
  </g>
  <text x="30" y="465" font-size="12" fill="#535679" font-style="italic">Ta demande est <tspan font-weight="700" fill="#f59e0b">SUBMITTED</tspan> — le manager la voit dans <tspan font-family="monospace" fill="#5b5fd6">/leaves?filter=pending</tspan> et peut approuver ou refuser.</text>
</svg>
