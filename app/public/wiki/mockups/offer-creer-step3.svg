<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="380" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 5</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Ajouter les postes (lignes chiffrées)</text>
  <rect x="20" y="60" width="860" height="290" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Postes de l'offre</text>
  <rect x="40" y="110" width="820" height="30" fill="#f3f3f7"/>
  <text x="55" y="130" font-size="10" font-weight="700" fill="#727496">↕</text>
  <text x="75" y="130" font-size="10" font-weight="700" fill="#727496">DESCRIPTION</text>
  <text x="580" y="130" font-size="10" font-weight="700" fill="#727496" text-anchor="end">QTÉ</text>
  <text x="720" y="130" font-size="10" font-weight="700" fill="#727496" text-anchor="end">PU HT</text>
  <text x="850" y="130" font-size="10" font-weight="700" fill="#727496" text-anchor="end">TOTAL HT</text>
  <rect x="40" y="145" width="820" height="50" fill="#fff"/>
  <text x="55" y="170" font-size="12" fill="#a1a1b8">≡</text>
  <text x="75" y="170" font-size="12" fill="#202037">Audit et cadrage — Phase 1</text>
  <text x="580" y="170" font-size="12" fill="#202037" text-anchor="end">5</text>
  <text x="720" y="170" font-size="12" fill="#202037" text-anchor="end">1 200,00 €</text>
  <text x="850" y="170" font-size="12" font-weight="600" fill="#202037" text-anchor="end">6 000,00 €</text>
  <line x1="40" y1="195" x2="860" y2="195" stroke="#e1e1ec"/>
  <text x="55" y="220" font-size="12" fill="#a1a1b8">≡</text>
  <text x="75" y="220" font-size="12" fill="#202037">Développement — Phase 2 (agile)</text>
  <text x="580" y="220" font-size="12" fill="#202037" text-anchor="end">40</text>
  <text x="720" y="220" font-size="12" fill="#202037" text-anchor="end">750,00 €</text>
  <text x="850" y="220" font-size="12" font-weight="600" fill="#202037" text-anchor="end">30 000,00 €</text>
  <line x1="40" y1="245" x2="860" y2="245" stroke="#e1e1ec"/>
  <text x="55" y="270" font-size="12" fill="#a1a1b8">≡</text>
  <text x="75" y="270" font-size="12" fill="#202037">Formation utilisateurs</text>
  <text x="580" y="270" font-size="12" fill="#202037" text-anchor="end">3</text>
  <text x="720" y="270" font-size="12" fill="#202037" text-anchor="end">1 500,00 €</text>
  <text x="850" y="270" font-size="12" font-weight="600" fill="#202037" text-anchor="end">4 500,00 €</text>
  <rect x="40" y="295" width="140" height="34" rx="6" fill="#eef2ff"/>
  <text x="110" y="317" font-size="12" fill="#5b5fd6" font-weight="600" text-anchor="middle">+ Ajouter poste</text>
  <text x="20" y="370" font-size="11" font-weight="600" font-style="italic" fill="#535679">Drag l'icône ≡ pour réorganiser. Total se calcule à chaque changement.</text>
</svg>
