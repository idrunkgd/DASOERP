<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Compléter compétences à la main</text><rect x="720" y="20" width="160" height="46" rx="8" fill="#dcfce7"/><text x="800" y="42" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">Candidat créé</text><text x="800" y="58" font-size="10" fill="#166534" text-anchor="middle">2 exp + form ajoutées</text><rect x="20" y="80" width="860" height="200" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="100" width="820" height="70" rx="8" fill="#fef3c7"/><text x="60" y="125" font-size="12" font-weight="700" fill="#78350f">⚠ Compétences non extraites</text><text x="60" y="145" font-size="11" fill="#92400e">La section Skills LinkedIn est peu fiable (mots-clés vagues, boostés par endorsements).</text><text x="60" y="162" font-size="11" fill="#92400e">→ Ajoute manuellement les compétences pertinentes selon les expériences.</text><text x="40" y="200" font-size="12" font-weight="700" fill="#5b5fd6">Rituel : compléter le profil en 2 min</text><text x="55" y="222" font-size="11" fill="#535679">• Ajouter compétences (autocomplete depuis catalogue)</text><text x="55" y="240" font-size="11" fill="#535679">• Assigner un test technique si pertinent (bouton "Assigner test")</text><text x="55" y="258" font-size="11" fill="#535679">• Owner = toi (pour le suivi commercial)</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">2-3 min de complétion humaine après le parsing = fiche prête à être proposée.</text></svg>
