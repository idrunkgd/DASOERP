<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="380" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 5</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Repas — participants obligatoires</text>

  <rect x="20" y="60" width="860" height="290" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="2"/>

  <rect x="40" y="80" width="820" height="46" rx="8" fill="#fffbeb"/>
  <text x="55" y="108" font-size="12" font-weight="700" fill="#78350f">⚠ Catégorie Repas + montant &gt; 30€ : participants obligatoires</text>

  <text x="40" y="155" font-size="11" font-weight="600" fill="#727496">PARTICIPANTS *</text>
  <text x="40" y="172" font-size="10" fill="#a1a1b8">Interne + client, chaque personne présente au repas</text>

  <rect x="40" y="185" width="820" height="80" rx="8" fill="#fff" stroke="#c2c3d6"/>

  <rect x="55" y="200" width="140" height="26" rx="13" fill="#e0e7ff"/>
  <text x="125" y="217" font-size="11" font-weight="600" fill="#3730a3" text-anchor="middle">Alice M. (interne)</text>

  <rect x="205" y="200" width="150" height="26" rx="13" fill="#dbeafe"/>
  <text x="280" y="217" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Bob C. (Client A)</text>

  <rect x="365" y="200" width="180" height="26" rx="13" fill="#dbeafe"/>
  <text x="455" y="217" font-size="11" font-weight="600" fill="#1e40af" text-anchor="middle">Charlie A. (Client A)</text>

  <text x="55" y="248" font-size="10" fill="#5b5fd6">+ Ajouter un participant</text>

  <text x="40" y="295" font-size="12" font-weight="700" fill="#78350f">💡 Pourquoi c'est obligatoire</text>
  <text x="40" y="315" font-size="11" fill="#535679">Le comptable et le fisc ont besoin de connaître les participants pour valider</text>
  <text x="40" y="332" font-size="11" fill="#535679">la déductibilité (règles anti-abus repas d'affaires). Sinon, note refusée.</text>

  <text x="20" y="370" font-size="11" fill="#535679" font-style="italic">Repas ≤ 30€ (café rapide, sandwich) : pas de participants requis. Au-delà : obligatoire.</text>
</svg>
