<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 5 / 5</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Mot de passe initial + groupes d'accès</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="11" font-weight="600" fill="#727496">MOT DE PASSE INITIAL * (8 caractères min)</text><rect x="40" y="98" width="380" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/><text x="55" y="120" font-size="14" fill="#535679" font-family="monospace">••••••••••••</text><rect x="430" y="98" width="410" height="34" rx="4" fill="#dcfce7" stroke="#059669"/><text x="445" y="120" font-size="11" fill="#065f46">✓ Force : forte (12 chars, alpha+num+symb)</text><text x="40" y="170" font-size="12" font-weight="700" fill="#5b5fd6">Groupes d'accès (permissions)</text><rect x="40" y="185" width="220" height="30" rx="15" fill="#eef2ff"/><text x="150" y="204" font-size="11" font-weight="600" fill="#5b5fd6" text-anchor="middle">✓ Consultant (défaut)</text><rect x="280" y="185" width="180" height="30" rx="15" fill="#eef2ff"/><text x="370" y="204" font-size="11" font-weight="600" fill="#5b5fd6" text-anchor="middle">✓ Notes de frais</text><rect x="480" y="185" width="140" height="30" rx="15" fill="#fff" stroke="#c2c3d6"/><text x="550" y="204" font-size="11" fill="#535679" text-anchor="middle">○ Manager RH</text><rect x="640" y="185" width="140" height="30" rx="15" fill="#fff" stroke="#c2c3d6"/><text x="710" y="204" font-size="11" fill="#535679" text-anchor="middle">○ Finance</text><rect x="720" y="235" width="140" height="34" rx="6" fill="#059669"/><text x="790" y="257" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">✓ Créer utilisateur</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Communique le mot de passe sur un canal sécurisé. L'user devra le changer à sa 1ère connexion.</text></svg>
