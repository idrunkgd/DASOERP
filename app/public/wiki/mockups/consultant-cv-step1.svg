<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">/me → onglet CV</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Mon espace</text><text x="130" y="90" font-size="12" fill="#535679">Général  ·  <tspan fill="#5b5fd6" font-weight="700">CV ●</tspan>  ·  RH</text><rect x="40" y="115" width="820" height="80" rx="8" fill="#eef2ff"/><text x="60" y="140" font-size="12" font-weight="700" fill="#5b5fd6">Sections du CV</text><text x="60" y="163" font-size="11" fill="#535679">▸ Infos perso (nom, photo, ville, langues, années d'exp)</text><text x="60" y="180" font-size="11" fill="#535679">▸ Expériences pro (chronologique inversée) · Compétences · Taux journalier</text><text x="40" y="225" font-size="12" fill="#535679">Rendu final : PDF à la charte Dasolabs, envoyable à un client via mission-request</text><rect x="620" y="240" width="220" height="34" rx="6" fill="#5b5fd6"/><text x="730" y="262" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">👁 Aperçu CV PDF</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Tenir à jour son CV : rituel trimestriel minimum, dès qu'un nouveau skill est acquis.</text></svg>
