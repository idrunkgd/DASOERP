<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 3</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Vue Alice après rollover : Légaux 2027 + reliquat 2026</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="200" height="90" rx="8" fill="#fff" stroke="#e1e1ec"/><text x="55" y="102" font-size="10" font-weight="700" fill="#727496">LÉGAUX 2027</text><text x="55" y="135" font-size="26" font-weight="700" fill="#5b5fd6">20</text><text x="105" y="135" font-size="12" fill="#727496">/ 20 j</text><text x="55" y="157" font-size="9" fill="#a1a1b8">Neuf (rollover)</text><rect x="250" y="80" width="200" height="90" rx="8" fill="#fff" stroke="#e1e1ec"/><text x="265" y="102" font-size="10" font-weight="700" fill="#727496">RTT 2027</text><text x="265" y="135" font-size="26" font-weight="700" fill="#5b5fd6">12</text><text x="315" y="135" font-size="12" fill="#727496">/ 12 j</text><text x="265" y="157" font-size="9" fill="#a1a1b8">Neuf (rollover)</text><rect x="460" y="80" width="200" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b"/><text x="475" y="102" font-size="10" font-weight="700" fill="#78350f">ANNÉE PRÉCÉDENTE</text><text x="475" y="135" font-size="26" font-weight="700" fill="#f59e0b">18,5</text><text x="530" y="135" font-size="12" fill="#78350f">j</text><text x="475" y="157" font-size="9" fill="#92400e">Reliquat 2026 reporté</text><rect x="670" y="80" width="180" height="90" rx="8" fill="#5b5fd6"/><text x="685" y="102" font-size="10" font-weight="700" fill="#c7d2fe">TOTAL</text><text x="685" y="135" font-size="26" font-weight="700" fill="#fff">50,5 j</text><text x="685" y="157" font-size="9" fill="#c7d2fe">Disponible en 2027</text><text x="40" y="210" font-size="12" font-weight="700" fill="#059669">Traçabilité :</text><text x="55" y="232" font-size="11" fill="#535679">Report 2026 → 2027 = 5,5j légaux + 10j RTT + 3j ancien report = 18,5j</text><text x="55" y="250" font-size="11" fill="#535679">ActivityLog conserve la trace du rollover (auditable dans /audit)</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">L'ancien report devient "Année précédente 2027" — visible et utilisable.</text></svg>
