<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1000" height="500" fill="#f3f3f7"/>

  <!-- Formulaire vide déployé -->
  <rect x="30" y="60" width="940" height="380" rx="10" fill="#fff" stroke="#5b5fd6" stroke-width="2"/>
  <text x="50" y="95" font-size="16" font-weight="700" fill="#202037">Nouvelle demande de congé</text>

  <text x="50" y="130" font-size="11" font-weight="600" fill="#727496">DU *</text>
  <rect x="50" y="140" width="180" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="164" font-size="12" fill="#a1a1b8" font-style="italic">jj/mm/aaaa</text>

  <text x="250" y="130" font-size="11" font-weight="600" fill="#727496">AU *</text>
  <rect x="250" y="140" width="180" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="265" y="164" font-size="12" fill="#a1a1b8" font-style="italic">jj/mm/aaaa</text>

  <text x="450" y="130" font-size="11" font-weight="600" fill="#727496">JOURS OUVRÉS</text>
  <rect x="450" y="140" width="100" height="36" rx="5" fill="#e1e1ec"/>
  <text x="500" y="164" font-size="12" fill="#a1a1b8" text-anchor="middle">—</text>

  <text x="570" y="130" font-size="11" font-weight="600" fill="#727496">TYPE *</text>
  <rect x="570" y="140" width="180" height="36" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="585" y="164" font-size="12" fill="#a1a1b8" font-style="italic">Sélectionne...</text>
  <text x="740" y="164" font-size="10" fill="#727496">▼</text>

  <!-- Motif -->
  <text x="50" y="200" font-size="11" font-weight="600" fill="#727496">MOTIF (optionnel)</text>
  <rect x="50" y="210" width="700" height="60" rx="5" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="234" font-size="12" fill="#a1a1b8" font-style="italic">Vacances familiales, week-end prolongé...</text>

  <!-- Bouton -->
  <rect x="820" y="395" width="130" height="36" rx="6" fill="#5b5fd6"/>
  <text x="885" y="418" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Soumettre</text>

  <!-- Badge étape -->
  <g>
    <rect x="20" y="15" width="120" height="26" rx="13" fill="#5b5fd6"/>
    <text x="80" y="32" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 5</text>
  </g>
  <text x="30" y="475" font-size="12" fill="#535679" font-style="italic">Le formulaire s'ouvre. Champs vides à compléter — obligatoires : dates, type.</text>
</svg>
