  <text x="55" y="215" font-size="11" fill="#535679">💡 Une seule saisie → 6 cellules créées automatiquement (oct 2026 → mar 2027).</text>
  <text x="55" y="238" font-size="11" fill="#535679">Chaque cellule est individuellement PAID-able quand tu reçois vraiment le virement.</text>

  <text x="20" y="320" font-size="11" fill="#535679" font-style="italic">Récurrent avec date de fin = ERP génère toutes les échéances. Pas besoin de saisir 6 fois.</text>
