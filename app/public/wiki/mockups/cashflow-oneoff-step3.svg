    <rect x="480" y="140" width="80" height="40" fill="#dcfce7"/><text x="520" y="164" fill="#059669">+8 500</text>
    <rect x="560" y="140" width="80" height="40" fill="#dcfce7"/><text x="600" y="164" fill="#059669">+8 500</text>
    <rect x="640" y="140" width="80" height="40" fill="#dcfce7"/><text x="680" y="164" fill="#059669">+8 500</text>
    <rect x="720" y="140" width="80" height="40" fill="#dcfce7"/><text x="760" y="164" fill="#059669">+8 500</text>
