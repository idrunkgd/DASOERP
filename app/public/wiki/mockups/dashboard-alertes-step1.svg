<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="350" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#ef4444"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 3</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Cartes ROUGES — urgent, action immédiate</text>

  <rect x="20" y="60" width="860" height="230" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Actions du jour</text>

  <rect x="40" y="105" width="260" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <circle cx="60" cy="130" r="8" fill="#ef4444"/>
  <text x="80" y="126" font-size="12" font-weight="700" fill="#7f1d1d">Note de frais bloquée</text>
  <text x="80" y="145" font-size="10" fill="#991b1b">Alice Martin — 245€</text>
  <text x="80" y="162" font-size="10" fill="#991b1b">Reçu manquant depuis 6 jours</text>
  <text x="80" y="185" font-size="9" fill="#dc2626" font-style="italic">→ Cliquer pour ouvrir</text>

  <rect x="320" y="105" width="260" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <circle cx="340" cy="130" r="8" fill="#ef4444"/>
  <text x="360" y="126" font-size="12" font-weight="700" fill="#7f1d1d">Congé refusé sans motif</text>
  <text x="360" y="145" font-size="10" fill="#991b1b">Bob Durant — 10j en août</text>
  <text x="360" y="162" font-size="10" fill="#991b1b">Manager a refusé sans commentaire</text>
  <text x="360" y="185" font-size="9" fill="#dc2626" font-style="italic">→ Contexte à donner</text>

  <rect x="600" y="105" width="260" height="90" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <circle cx="620" cy="130" r="8" fill="#ef4444"/>
  <text x="640" y="126" font-size="12" font-weight="700" fill="#7f1d1d">Milestone 45j en retard</text>
  <text x="640" y="145" font-size="10" fill="#991b1b">Projet ACME — 12 500€</text>
  <text x="640" y="162" font-size="10" fill="#991b1b">Facture émise le 08/06, non payée</text>
  <text x="640" y="185" font-size="9" fill="#dc2626" font-style="italic">→ Relance client</text>

  <text x="40" y="230" font-size="12" font-weight="600" fill="#ef4444">✋ Objectif : vider TOUTES les cartes rouges chaque matin</text>
  <text x="40" y="252" font-size="11" fill="#535679">Si tu ne peux pas agir maintenant, note l'action ailleurs et passe à la suivante.</text>

  <text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Rouge = urgence. Un clic sur la carte ouvre la fiche concernée directement.</text>
</svg>
