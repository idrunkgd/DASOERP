<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1000" height="500" fill="#f3f3f7"/>

  <rect x="30" y="60" width="940" height="380" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="50" y="95" font-size="16" font-weight="700" fill="#202037">Nouvelle demande de congé</text>

  <!-- Dates remplies (bordure verte) -->
  <text x="50" y="130" font-size="11" font-weight="600" fill="#727496">DU *</text>
  <rect x="50" y="140" width="180" height="36" rx="5" fill="#fff" stroke="#10b981" stroke-width="2"/>
  <text x="65" y="164" font-size="13" font-weight="500" fill="#202037">10/08/2026</text>
  <text x="215" y="164" font-size="14" fill="#10b981">✓</text>

  <text x="250" y="130" font-size="11" font-weight="600" fill="#727496">AU *</text>
  <rect x="250" y="140" width="180" height="36" rx="5" fill="#fff" stroke="#10b981" stroke-width="2"/>
  <text x="265" y="164" font-size="13" font-weight="500" fill="#202037">21/08/2026</text>
  <text x="415" y="164" font-size="14" fill="#10b981">✓</text>

  <!-- Jours calculés auto -->
  <text x="450" y="130" font-size="11" font-weight="600" fill="#727496">JOURS OUVRÉS</text>
  <rect x="450" y="140" width="100" height="36" rx="5" fill="#dcfce7" stroke="#86efac"/>
  <text x="500" y="164" font-size="16" font-weight="700" fill="#166534" text-anchor="middle">10</text>
  <text x="450" y="192" font-size="10" fill="#059669" font-style="italic">Calculé auto</text>

  <!-- Dropdown Type ouvert -->
  <text x="570" y="130" font-size="11" font-weight="600" fill="#727496">TYPE *</text>
  <rect x="570" y="140" width="180" height="36" rx="5" fill="#fff" stroke="#5b5fd6" stroke-width="2"/>
  <text x="585" y="164" font-size="12" font-weight="600" fill="#5b5fd6">Légaux (ANNUAL)</text>
  <text x="740" y="164" font-size="10" fill="#5b5fd6">▲</text>

  <!-- Dropdown options -->
  <rect x="570" y="180" width="180" height="126" rx="5" fill="#fff" stroke="#e1e1ec" filter="drop-shadow(0 4px 6px rgba(0,0,0,0.1))"/>
  <rect x="570" y="180" width="180" height="30" fill="#eef2ff"/>
  <text x="585" y="200" font-size="12" font-weight="600" fill="#5b5fd6">✓ Légaux (ANNUAL)</text>
  <text x="585" y="228" font-size="12" fill="#535679">RTT</text>
  <text x="585" y="252" font-size="12" fill="#535679">Année précédente</text>
  <text x="585" y="276" font-size="12" fill="#535679">Sans solde</text>
  <text x="585" y="300" font-size="12" fill="#535679">Spécial</text>

  <text x="50" y="330" font-size="11" font-weight="600" fill="#727496">MOTIF (optionnel)</text>
  <rect x="50" y="340" width="700" height="60" rx="5" fill="#fff" stroke="#c2c3d6"/>
  <text x="65" y="365" font-size="12" fill="#202037">Vacances en famille — 2 semaines pleines</text>

  <rect x="820" y="395" width="130" height="36" rx="6" fill="#5b5fd6"/>
  <text x="885" y="418" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Soumettre</text>

  <g>
    <rect x="20" y="15" width="120" height="26" rx="13" fill="#5b5fd6"/>
    <text x="80" y="32" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 5</text>
  </g>
  <text x="30" y="475" font-size="12" fill="#535679" font-style="italic">Remplis les dates. Les jours ouvrés se calculent automatiquement. Choisis le type dans la liste déroulante.</text>
</svg>
