<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Autocomplete compétences + création à la volée</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Compétences</text><rect x="40" y="110" width="820" height="46" rx="4" fill="#fff" stroke="#5b5fd6" stroke-width="2"/><rect x="55" y="120" width="80" height="26" rx="13" fill="#e0e7ff"/><text x="95" y="137" font-size="11" font-weight="600" fill="#3730a3" text-anchor="middle">Node.js</text><rect x="145" y="120" width="90" height="26" rx="13" fill="#e0e7ff"/><text x="190" y="137" font-size="11" font-weight="600" fill="#3730a3" text-anchor="middle">TypeScript</text><rect x="245" y="120" width="100" height="26" rx="13" fill="#e0e7ff"/><text x="295" y="137" font-size="11" font-weight="600" fill="#3730a3" text-anchor="middle">PostgreSQL</text><text x="355" y="137" font-size="12" fill="#202037" font-family="monospace">|kuber</text><rect x="55" y="170" width="380" height="80" rx="4" fill="#fff" stroke="#e1e1ec"/><text x="70" y="192" font-size="11" fill="#535679">Suggestions :</text><rect x="70" y="200" width="180" height="24" rx="12" fill="#eef2ff"/><text x="160" y="216" font-size="10" font-weight="600" fill="#5b5fd6" text-anchor="middle">Kubernetes (existante)</text><rect x="260" y="200" width="140" height="24" rx="12" fill="#dcfce7"/><text x="330" y="216" font-size="10" font-weight="600" fill="#065f46" text-anchor="middle">+ Créer "Kuber"</text><text x="70" y="240" font-size="10" fill="#a1a1b8" font-style="italic">Autocomplete depuis le catalogue. Casse préservée si création nouvelle.</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Fuzzy match sur les compétences existantes. Créer une nouvelle si aucun match.</text></svg>
