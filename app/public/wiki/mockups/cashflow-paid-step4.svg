<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1000" height="480" fill="#fff"/>

  <text x="30" y="40" font-size="18" font-weight="700" fill="#202037">Panneau "Ce mois-ci"</text>
  <text x="30" y="60" font-size="12" fill="#535679">Récap du mois avec ta tranche fraîchement encaissée</text>

  <!-- Card journal -->
  <rect x="30" y="85" width="940" height="330" rx="10" fill="#f9fafb" stroke="#e1e1ec"/>

  <!-- Header du panel -->
  <rect x="30" y="85" width="940" height="40" fill="#eef2ff"/>
  <text x="50" y="110" font-size="14" font-weight="700" fill="#5b5fd6">Mars 2026 — Recettes encaissées</text>
  <text x="940" y="110" font-size="14" font-weight="700" fill="#5b5fd6" text-anchor="end">+16 637,50 €</text>

  <!-- Ligne : la tranche qu'on vient de marquer PAID -->
  <rect x="30" y="130" width="940" height="70" fill="#dcfce7" stroke="#86efac"/>
  <circle cx="60" cy="165" r="14" fill="#059669"/>
  <path d="M 53 165 L 58 170 L 68 158" stroke="#fff" stroke-width="2.5" fill="none"/>
  <text x="85" y="152" font-size="13" font-weight="700" fill="#065f46">Mission ACME 2026 — Alice Martin</text>
  <text x="85" y="170" font-size="11" fill="#166534">Tranche mars · 22 j × 625 € · TVA 21 %</text>
  <text x="85" y="188" font-size="10" fill="#059669" font-style="italic">Marqué payé aujourd'hui — solde compte impacté</text>
  <text x="940" y="165" font-size="18" font-weight="700" fill="#059669" text-anchor="end">+16 637,50 €</text>
  <text x="940" y="185" font-size="10" fill="#166534" text-anchor="end">TTC</text>

  <!-- Autres lignes plus grises (historique) -->
  <rect x="30" y="205" width="940" height="50" fill="#fff"/>
  <text x="50" y="228" font-size="12" font-weight="600" fill="#535679">Mission Beta Corp — Bob Durant</text>
  <text x="50" y="244" font-size="10" fill="#a1a1b8">Tranche mars · Payée le 05/03</text>
  <text x="940" y="235" font-size="14" font-weight="600" fill="#059669" text-anchor="end">+9 982,50 €</text>

  <rect x="30" y="260" width="940" height="50" fill="#fff"/>
  <text x="50" y="283" font-size="12" font-weight="600" fill="#535679">Subside région wallonne</text>
  <text x="50" y="299" font-size="10" fill="#a1a1b8">One-off · Payé le 15/03</text>
  <text x="940" y="290" font-size="14" font-weight="600" fill="#059669" text-anchor="end">+3 500,00 €</text>

  <!-- Solde compte total -->
  <line x1="30" y1="320" x2="970" y2="320" stroke="#c2c3d6"/>
  <rect x="30" y="330" width="940" height="70" fill="#5b5fd6"/>
  <text x="50" y="360" font-size="13" font-weight="700" fill="#c7d2fe">SOLDE COMPTE APRÈS ENCAISSEMENT</text>
  <text x="50" y="385" font-size="11" fill="#c7d2fe">Vérité banque : bootstrap + tous les PAID historiques</text>
  <text x="940" y="378" font-size="24" font-weight="700" fill="#fff" text-anchor="end">78 937,50 €</text>

  <!-- Badge étape -->
  <g>
    <rect x="20" y="10" width="150" height="26" rx="13" fill="#059669"/>
    <text x="95" y="27" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 4 · TERMINÉ</text>
  </g>
  <text x="30" y="450" font-size="12" fill="#535679" font-style="italic">Ta tranche est <tspan font-weight="700" fill="#059669">PAID</tspan> et remonte dans "Ce mois-ci" avec le montant TTC. Le solde compte est à jour partout dans l'ERP (dashboard, cashflow, KPI).</text>
</svg>
