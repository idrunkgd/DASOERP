<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 3</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Insérer via le bouton Image de l'éditeur</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="80" width="130" height="34" rx="6" fill="#eef2ff" stroke="#5b5fd6" stroke-width="2"/><text x="105" y="102" font-size="12" font-weight="700" fill="#5b5fd6" text-anchor="middle">🖼 Image</text><rect x="180" y="80" width="140" height="34" rx="6" fill="#f3f3f7"/><text x="250" y="102" font-size="11" fill="#535679" text-anchor="middle">Sauvegarder</text><text x="40" y="145" font-size="12" font-weight="700" fill="#202037">Positionne le curseur à l'endroit voulu</text><text x="40" y="165" font-size="11" fill="#535679">Cmd+Image ou clic sur le bouton "Image" → sélecteur de fichier</text><rect x="40" y="185" width="820" height="70" rx="8" fill="#eef2ff"/><text x="60" y="210" font-size="12" font-weight="700" fill="#5b5fd6">L'ERP insère automatiquement :</text><text x="60" y="232" font-size="11" font-family="monospace" fill="#202037">![nom-fichier](/api/wiki-images/xxxxx)</text><text x="60" y="250" font-size="10" fill="#535679">Remplace "nom-fichier" par une description courte = légende automatique</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Max 5 Mo par image. PNG / JPEG / GIF / WebP acceptés.</text></svg>
