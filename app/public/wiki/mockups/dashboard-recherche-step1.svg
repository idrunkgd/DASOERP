<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="350" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 3</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Ouvrir la palette avec Cmd+K</text>

  <rect x="20" y="60" width="500" height="230" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Ouvre depuis n'importe où</text>
  <text x="40" y="115" font-size="12" fill="#535679">Peu importe la page où tu es :</text>
  <text x="40" y="135" font-size="12" fill="#535679">Dashboard, fiche user, cashflow, planning...</text>

  <g>
    <rect x="40" y="160" width="120" height="46" rx="8" fill="#202037"/>
    <text x="100" y="188" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">⌘ K</text>
  </g>
  <text x="180" y="188" font-size="14" fill="#535679">macOS</text>

  <g>
    <rect x="40" y="220" width="140" height="46" rx="8" fill="#202037"/>
    <text x="110" y="248" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">CTRL + K</text>
  </g>
  <text x="200" y="248" font-size="14" fill="#535679">Windows / Linux</text>

  <rect x="540" y="60" width="340" height="230" rx="10" fill="#eef2ff" stroke="#5b5fd6"/>
  <text x="560" y="90" font-size="13" font-weight="700" fill="#5b5fd6">Astuce raccourci topbar</text>
  <text x="560" y="115" font-size="12" fill="#535679">Le petit "⌘K" gris à droite de la topbar</text>
  <text x="560" y="132" font-size="12" fill="#535679">te rappelle le raccourci en permanence.</text>
  <text x="560" y="160" font-size="12" fill="#535679">Clique dessus si tu es allergique au clavier —</text>
  <text x="560" y="177" font-size="12" fill="#535679">ça ouvre la palette aussi.</text>

  <rect x="560" y="205" width="80" height="30" rx="6" fill="#fff" stroke="#c2c3d6"/>
  <text x="600" y="224" font-size="12" fill="#535679" text-anchor="middle">⌘ K</text>
  <text x="655" y="224" font-size="11" fill="#a1a1b8">← comme celui-ci</text>

  <text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Un seul raccourci pour tout chercher — la commande la plus rentable de l'ERP.</text>
</svg>
