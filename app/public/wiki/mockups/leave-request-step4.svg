<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="1000" height="480" fill="#f3f3f7"/>

  <rect x="30" y="60" width="940" height="360" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="50" y="95" font-size="16" font-weight="700" fill="#202037">Nouvelle demande de congé</text>

  <text x="50" y="125" font-size="12" fill="#535679">10/08 → 21/08/2026 · <tspan font-weight="600" fill="#5b5fd6">10 jours</tspan> · Type : Légaux</text>

  <!-- Section mission client (mise en évidence) -->
  <rect x="50" y="160" width="900" height="180" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>

  <text x="70" y="188" font-size="12" font-weight="700" fill="#78350f">⚠ Tu es actuellement en mission chez Client A</text>
  <text x="70" y="208" font-size="11" fill="#92400e">Mission MISSION-2026-08 · Consultant : Alice Martin · Projet ACME 2026</text>

  <!-- Case cochée avec animation-like -->
  <rect x="70" y="235" width="24" height="24" rx="4" fill="#059669" stroke="#047857" stroke-width="2"/>
  <path d="M 76 246 L 82 253 L 90 240" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="105" y="253" font-size="13" font-weight="700" fill="#78350f">Demandé chez le client et accordé</text>
  <text x="105" y="273" font-size="11" fill="#92400e">Coche ceci uniquement si le PM du client a validé de son côté.</text>
  <text x="105" y="290" font-size="11" fill="#92400e">Le manager RH verra cette info et décidera en connaissance de cause.</text>

  <!-- Notes optionnelles -->
  <text x="70" y="320" font-size="11" fill="#a1a1b8" font-style="italic">Notes optionnelles pour le manager : "PM Client A OK (email 22/07)"</text>

  <!-- Bouton -->
  <rect x="820" y="370" width="130" height="36" rx="6" fill="#5b5fd6"/>
  <text x="885" y="393" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Soumettre</text>

  <g>
    <rect x="20" y="15" width="120" height="26" rx="13" fill="#5b5fd6"/>
    <text x="80" y="32" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 5</text>
  </g>
  <text x="30" y="450" font-size="12" fill="#535679" font-style="italic">Si tu es en mission client, coche <tspan font-weight="700" fill="#059669">Demandé chez le client et accordé</tspan> — sinon le manager va probablement refuser.</text>
</svg>
