<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Le candidat passe le test (vue anonyme)</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="720" y="80" width="140" height="36" rx="6" fill="#fef3c7"/><text x="790" y="103" font-size="12" font-weight="700" fill="#78350f" text-anchor="middle">⏱ 32 : 15</text><text x="40" y="95" font-size="13" font-weight="600" fill="#535679">Question 8 / 30</text><text x="40" y="130" font-size="14" font-weight="700" fill="#202037">Quelle commande Docker liste les containers arrêtés ?</text><rect x="40" y="155" width="820" height="30" rx="4" fill="#fff" stroke="#c2c3d6"/><text x="60" y="175" font-size="12" fill="#202037">○ docker ps</text><rect x="40" y="190" width="820" height="30" rx="4" fill="#eef2ff" stroke="#5b5fd6" stroke-width="2"/><text x="60" y="210" font-size="12" font-weight="600" fill="#5b5fd6">● docker ps -a</text><rect x="40" y="225" width="820" height="30" rx="4" fill="#fff" stroke="#c2c3d6"/><text x="60" y="245" font-size="12" fill="#202037">○ docker containers</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Timer + snapshot des questions au démarrage (les changements ultérieurs ne perturbent pas).</text></svg>
