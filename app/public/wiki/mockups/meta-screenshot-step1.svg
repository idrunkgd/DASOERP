<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 3</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Capturer proprement — checklist</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><rect x="40" y="85" width="24" height="24" rx="4" fill="#5b5fd6"/><path d="M 46 96 L 52 103 L 60 90" stroke="#fff" stroke-width="2.5" fill="none"/><text x="75" y="102" font-size="12" fill="#202037">Fermer les distractions (onglets, notifs, fenêtres qui se superposent)</text><rect x="40" y="115" width="24" height="24" rx="4" fill="#5b5fd6"/><path d="M 46 126 L 52 133 L 60 120" stroke="#fff" stroke-width="2.5" fill="none"/><text x="75" y="132" font-size="12" fill="#202037">Cadrer uniquement la zone utile (Cmd+Maj+4 macOS · Win+Maj+S Windows)</text><rect x="40" y="145" width="24" height="24" rx="4" fill="#5b5fd6"/><path d="M 46 156 L 52 163 L 60 150" stroke="#fff" stroke-width="2.5" fill="none"/><text x="75" y="162" font-size="12" fill="#202037">Résolution ~1200-1600 px (trop grand alourdit, trop petit rend illisible)</text><rect x="40" y="175" width="24" height="24" rx="4" fill="#5b5fd6"/><path d="M 46 186 L 52 193 L 60 180" stroke="#fff" stroke-width="2.5" fill="none"/><text x="75" y="192" font-size="12" fill="#202037">Anonymiser données sensibles (noms clients, montants confidentiels)</text><rect x="40" y="205" width="24" height="24" rx="4" fill="#5b5fd6"/><path d="M 46 216 L 52 223 L 60 210" stroke="#fff" stroke-width="2.5" fill="none"/><text x="75" y="222" font-size="12" fill="#202037">Format PNG (UI net) ou WebP (moderne, léger)</text><rect x="40" y="245" width="820" height="30" rx="4" fill="#fef3c7"/><text x="55" y="265" font-size="11" fill="#78350f">⚠ Un consultant en formation n'a pas besoin de voir "Client X — 45 000€"</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">5 vérifs, 30 secondes. Une capture propre vaut 200 mots — une mauvaise désoriente.</text></svg>
