<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" font-family="-apple-system,'Segoe UI',sans-serif">
  <!-- Fond avec overlay sombre pour signaler que le modal est ouvert -->
  <rect width="1000" height="500" fill="#202037"/>
  <rect width="1000" height="500" fill="rgba(0,0,0,0.5)"/>

  <!-- Modal centré -->
  <rect x="150" y="60" width="700" height="400" rx="12" fill="#fff"/>

  <!-- Header modal -->
  <text x="180" y="100" font-size="18" font-weight="700" fill="#202037">Tranche mission — Mars 2026</text>
  <text x="180" y="120" font-size="12" fill="#535679">Mission ACME 2026 (Alice) · 22 jours × 625 €/j</text>
  <text x="810" y="100" font-size="20" fill="#9b9cb8" text-anchor="end">×</text>

  <line x1="180" y1="140" x2="820" y2="140" stroke="#e1e1ec"/>

  <!-- Info principale -->
  <text x="180" y="170" font-size="11" font-weight="600" fill="#727496">MONTANT</text>
  <text x="180" y="200" font-size="26" font-weight="700" fill="#202037">13 750 € HT</text>
  <text x="180" y="222" font-size="12" fill="#535679">16 637,50 € TTC (TVA 21%)</text>

  <text x="500" y="170" font-size="11" font-weight="600" fill="#727496">STATUT ACTUEL</text>
  <rect x="500" y="185" width="120" height="26" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="560" y="203" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">INVOICED</text>

  <text x="500" y="240" font-size="11" font-weight="600" fill="#727496">DATE ENCAISSEMENT</text>
  <text x="500" y="262" font-size="13" fill="#202037">31 mars 2026</text>

  <line x1="180" y1="290" x2="820" y2="290" stroke="#e1e1ec"/>

  <!-- Actions statut -->
  <text x="180" y="320" font-size="11" font-weight="600" fill="#727496">CHANGER LE STATUT</text>

  <rect x="180" y="335" width="130" height="42" rx="6" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="245" y="360" font-size="12" font-weight="600" fill="#535679" text-anchor="middle">PLANNED</text>

  <rect x="320" y="335" width="130" height="42" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="385" y="360" font-size="12" font-weight="700" fill="#1e40af" text-anchor="middle">INVOICED (actuel)</text>

  <!-- Bouton MARQUER PAYÉ surligné avec pulsation -->
  <g>
    <rect x="460" y="331" width="200" height="50" rx="8" fill="#059669" stroke="#065f46" stroke-width="3"/>
    <text x="560" y="360" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">✓ Marquer payé</text>
    <!-- Flèche pointant -->
    <path d="M 560 405 L 560 388" stroke="#5b5fd6" stroke-width="3" fill="none" marker-end="url(#arrow2)"/>
  </g>
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#5b5fd6"/>
    </marker>
  </defs>

  <text x="560" y="425" font-size="12" font-weight="600" fill="#5b5fd6" text-anchor="middle">Clique ce bouton</text>

  <!-- Badge étape -->
  <g>
    <rect x="20" y="20" width="120" height="26" rx="13" fill="#5b5fd6"/>
    <text x="80" y="37" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 4</text>
  </g>
  <text x="180" y="470" font-size="11" fill="#a1a1b8" font-style="italic">Le modal s'ouvre. Clique <tspan font-weight="700" fill="#059669">Marquer payé</tspan> pour valider l'encaissement.</text>
</svg>
