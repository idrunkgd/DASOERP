<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 3</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Rollover TOUS d'un coup, en janvier</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="14" font-weight="700" fill="#202037">En début d'année</text><rect x="40" y="115" width="820" height="80" rx="8" fill="#eef2ff" stroke="#5b5fd6"/><text x="60" y="140" font-size="13" font-weight="700" fill="#5b5fd6">Bouton "Ajouter congés N+1 (tous)" en tête de tableau</text><text x="60" y="163" font-size="11" fill="#535679">Boucle sur TOUS les consultants actifs. Pour chacun :</text><text x="60" y="180" font-size="10" fill="#535679">→ Crée 20j Légaux 2027 + 12j RTT 2027 (ou quotas custom)</text><rect x="630" y="130" width="220" height="46" rx="8" fill="#5b5fd6"/><text x="740" y="158" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">🎉 Ajouter congés 2027 (tous)</text><text x="40" y="220" font-size="12" font-weight="700" fill="#059669">Résultat après clic :</text><text x="55" y="242" font-size="11" fill="#535679">✓ 5 consultants traités · 5 succès · 0 erreur</text><text x="55" y="260" font-size="11" fill="#535679">✓ Total : 100j Légaux + 60j RTT + 18j report N-1 créés pour 2027</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Idempotent : si déjà fait pour un user, ça refuse (pas de double quota).</text></svg>
