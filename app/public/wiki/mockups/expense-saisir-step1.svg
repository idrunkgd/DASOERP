<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="350" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 5</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Aller sur /expenses/new</text>

  <rect x="20" y="60" width="860" height="230" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="40" y="90" font-size="16" font-weight="700" fill="#202037">Notes de frais — Nouvelle note</text>
  <text x="40" y="112" font-size="11" fill="#535679">Tous les champs marqués * sont obligatoires</text>

  <text x="40" y="150" font-size="11" font-weight="600" fill="#727496">DATE *</text>
  <rect x="40" y="158" width="180" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="55" y="180" font-size="12" fill="#a1a1b8" font-style="italic">jj/mm/aaaa</text>

  <text x="240" y="150" font-size="11" font-weight="600" fill="#727496">CATÉGORIE *</text>
  <rect x="240" y="158" width="200" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="255" y="180" font-size="12" fill="#a1a1b8" font-style="italic">Sélectionne...</text>

  <text x="460" y="150" font-size="11" font-weight="600" fill="#727496">MONTANT TTC *</text>
  <rect x="460" y="158" width="180" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="475" y="180" font-size="12" fill="#a1a1b8" font-style="italic">0.00 €</text>

  <text x="660" y="150" font-size="11" font-weight="600" fill="#727496">CENTRE DE COÛT *</text>
  <rect x="660" y="158" width="180" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="675" y="180" font-size="12" fill="#a1a1b8" font-style="italic">CC-...</text>

  <text x="40" y="220" font-size="11" font-weight="600" fill="#727496">DESCRIPTION *</text>
  <rect x="40" y="228" width="800" height="34" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="55" y="250" font-size="12" fill="#a1a1b8" font-style="italic">Contexte de la dépense...</text>

  <text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Le form est vide, tous les champs obligatoires. Aucune sauvegarde brouillon tant que rien n'est rempli.</text>
</svg>
