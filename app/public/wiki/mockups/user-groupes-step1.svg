<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">/access/groups — Créer un nouveau groupe</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Nouveau groupe d'accès</text><text x="40" y="120" font-size="11" font-weight="600" fill="#727496">NOM *</text><rect x="40" y="128" width="400" height="34" rx="4" fill="#eef2ff" stroke="#5b5fd6" stroke-width="2"/><text x="55" y="150" font-size="12" font-weight="600" fill="#202037">Manager RH</text><text x="40" y="185" font-size="11" font-weight="600" fill="#727496">DESCRIPTION</text><rect x="40" y="193" width="820" height="60" rx="4" fill="#f3f3f7"/><text x="55" y="215" font-size="11" fill="#202037">Peut approuver notes de frais, congés, arrêts maladie.</text><text x="55" y="232" font-size="11" fill="#202037">Voit les KPI RH sur le dashboard.</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Un groupe = un ensemble nommé de permissions. Réutilisable pour plusieurs users.</text></svg>
