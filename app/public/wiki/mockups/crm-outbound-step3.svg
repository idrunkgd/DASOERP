<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="340" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 4</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Copy-paste vers LinkedIn (pas d'envoi auto)</text>
  <rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <rect x="40" y="90" width="380" height="180" rx="8" fill="#f9fafb"/>
  <text x="60" y="112" font-size="12" font-weight="700" fill="#202037">DasoERP</text>
  <text x="60" y="135" font-size="11" fill="#535679">Message personnalisé prêt :</text>
  <rect x="60" y="145" width="340" height="100" rx="4" fill="#fff" stroke="#c2c3d6"/>
  <text x="70" y="163" font-size="10" fill="#202037">Bonjour Diana,</text>
  <text x="70" y="180" font-size="10" fill="#202037">Je remarque que Beta Corp...</text>
  <rect x="60" y="253" width="140" height="24" rx="4" fill="#5b5fd6"/>
  <text x="130" y="269" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">📋 Copier</text>
  <text x="440" y="150" font-size="20" fill="#5b5fd6" font-weight="700">→</text>
  <rect x="470" y="90" width="380" height="180" rx="8" fill="#0a66c2"/>
  <text x="490" y="112" font-size="12" font-weight="700" fill="#fff">LinkedIn</text>
  <text x="490" y="135" font-size="11" fill="#c7d2fe">Message à Diana Beta :</text>
  <rect x="490" y="145" width="340" height="100" rx="4" fill="#fff"/>
  <text x="500" y="163" font-size="10" fill="#202037">Bonjour Diana,</text>
  <text x="500" y="180" font-size="10" fill="#202037">Je remarque que Beta Corp...</text>
  <text x="500" y="253" font-size="10" fill="#c7d2fe">Coller (Cmd+V) + Envoyer</text>
  <text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Pas de connecteur LinkedIn auto — copie manuelle. Interaction marquée SENT dans l'ERP après.</text>
</svg>
