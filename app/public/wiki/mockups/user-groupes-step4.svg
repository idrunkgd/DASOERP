<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 4 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Perms effectives = union groupes + overrides</text><rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Sophie Laurent — perms effectives</text><rect x="40" y="115" width="820" height="60" rx="8" fill="#eef2ff"/><text x="60" y="140" font-size="12" font-weight="700" fill="#5b5fd6">Depuis ses groupes (2)</text><text x="60" y="160" font-size="11" fill="#535679">Manager RH + Consultant → 12 permissions cumulées (union)</text><rect x="40" y="185" width="820" height="60" rx="8" fill="#dcfce7"/><text x="60" y="210" font-size="12" font-weight="700" fill="#065f46">+ Overrides individuels (2)</text><text x="60" y="230" font-size="11" fill="#166534">tests.manage (accès test admin exceptionnel) + audit.read</text><text x="40" y="270" font-size="11" fill="#a1a1b8" font-style="italic">Perms totales = 14. Ordre : groupes ∪ overrides. Refresh cache après modif.</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Un override permet un cas exceptionnel sans créer un groupe dédié.</text></svg>
