<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif"><rect width="900" height="340" fill="#f3f3f7"/><rect x="20" y="15" width="110" height="24" rx="12" fill="#059669"/><text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 2 / 4</text><text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Approuver (✓ vert) — solde décrémenté auto</text><rect x="720" y="20" width="160" height="46" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="2"/><text x="800" y="42" font-size="11" font-weight="700" fill="#065f46" text-anchor="middle">✓ Alice approuvée</text><text x="800" y="58" font-size="10" fill="#166534" text-anchor="middle">10 j décomptés</text><rect x="20" y="80" width="860" height="200" rx="10" fill="#fff" stroke="#e1e1ec"/><text x="40" y="108" font-size="13" font-weight="700" fill="#202037">Effets automatiques après clic ✓</text><text x="40" y="140" font-size="11" fill="#5b5fd6" font-weight="700">1</text><text x="60" y="140" font-size="12" fill="#202037">Statut passe en <tspan font-family="monospace" fill="#059669">APPROVED</tspan></text><text x="40" y="170" font-size="11" fill="#5b5fd6" font-weight="700">2</text><text x="60" y="170" font-size="12" fill="#202037">Solde Alice décrémenté de 10j légaux (visible sur son /me)</text><text x="40" y="200" font-size="11" fill="#5b5fd6" font-weight="700">3</text><text x="60" y="200" font-size="12" fill="#202037">Planning : ces 10 jours passent en <tspan fill="#f97316" font-weight="600">orange plein</tspan> (Congé validé)</text><text x="40" y="230" font-size="11" fill="#5b5fd6" font-weight="700">4</text><text x="60" y="230" font-size="12" fill="#202037">Alice reçoit une notif "ta demande a été approuvée"</text><text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Un seul clic vert = 4 actions automatiques. Solde recalculé dynamiquement.</text></svg>
