<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
<rect width="900" height="340" fill="#f3f3f7"/>
<rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
<text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 3 / 3</text>
<text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Comparaison scénarios A vs B</text>
<rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/>

<text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Sauvegarder pour comparer plusieurs propositions</text>
<rect x="40" y="115" width="380" height="150" rx="8" fill="#eef2ff"/>
<text x="60" y="140" font-size="12" font-weight="700" fill="#5b5fd6">Scénario A — 4500€ brut</text>
<text x="60" y="165" font-size="11" fill="#535679">Net : 2 890 €/mois</text>
<text x="60" y="185" font-size="11" fill="#535679">Coût employeur : 8 240 €</text>
<text x="60" y="215" font-size="11" fill="#059669" font-weight="700">TJM 705 € → Marge 30%</text>
<rect x="440" y="115" width="400" height="150" rx="8" fill="#fef3c7"/>
<text x="460" y="140" font-size="12" font-weight="700" fill="#78350f">Scénario B — 4200€ brut + voiture</text>
<text x="460" y="165" font-size="11" fill="#92400e">Net : 2 720 €/mois</text>
<text x="460" y="185" font-size="11" fill="#92400e">Coût employeur : 7 960 €</text>
<text x="460" y="215" font-size="11" fill="#78350f" font-weight="700">TJM 680 € → Marge 30%</text>
<text x="60" y="250" font-size="11" fill="#535679" font-style="italic">→ Scénario B : 25€ moins cher en TJM. Voiture = argument RH plus fort qu'un +300€ brut.</text>

<text x="20" y="325" font-size="11" fill="#535679" font-style="italic">Aide à structurer les offres RH consultant en optimisant le triangle coût/net/TJM.</text>
</svg>