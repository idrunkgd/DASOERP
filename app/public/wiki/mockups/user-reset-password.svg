<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="700" height="450" fill="#f3f3f7"/>

  <text x="30" y="35" font-size="20" font-weight="700" fill="#202037">Alice Martin</text>
  <text x="30" y="55" font-size="12" fill="#535679">alice@dasolabs.com · Charge planifiée : 32h / 38h</text>

  <!-- Bouton isolé (état initial) -->
  <text x="30" y="105" font-size="14" font-weight="600" fill="#202037">État initial (bouton isolé)</text>
  <rect x="30" y="120" width="270" height="40" rx="6" fill="#fff" stroke="#c2c3d6"/>
  <text x="55" y="145" font-size="12" fill="#535679">🔑 Réinitialiser le mot de passe</text>

  <text x="320" y="147" font-size="11" fill="#a1a1b8" font-style="italic">Uniquement visible pour un admin</text>

  <!-- Mini form (état déployé) -->
  <text x="30" y="205" font-size="14" font-weight="600" fill="#202037">État déployé après clic</text>

  <rect x="30" y="220" width="440" height="200" rx="8" fill="#fff" stroke="#5b5fd6" stroke-width="1.5"/>

  <text x="50" y="248" font-size="13" font-weight="700" fill="#202037">🔑 Nouveau mot de passe</text>
  <text x="450" y="248" font-size="16" fill="#9b9cb8" text-anchor="end">×</text>

  <text x="50" y="278" font-size="10" font-weight="600" fill="#727496">NOUVEAU MOT DE PASSE *</text>
  <rect x="50" y="286" width="400" height="30" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="306" font-size="12" fill="#535679" font-family="monospace">••••••••••••</text>

  <text x="50" y="335" font-size="10" font-weight="600" fill="#727496">CONFIRMER *</text>
  <rect x="50" y="343" width="400" height="30" rx="4" fill="#f3f3f7" stroke="#c2c3d6"/>
  <text x="65" y="363" font-size="12" fill="#535679" font-family="monospace">••••••••••••</text>

  <rect x="50" y="383" width="400" height="30" rx="4" fill="#5b5fd6"/>
  <text x="250" y="403" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">🔑 Réinitialiser</text>

  <text x="30" y="440" font-size="10" fill="#a1a1b8" font-style="italic">Isolé du form user général : marche même si la DB a des colonnes en retard sur le schéma.</text>
</svg>
