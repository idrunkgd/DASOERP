<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="-apple-system,'Segoe UI',sans-serif">
  <rect width="900" height="340" fill="#f3f3f7"/>
  <rect x="20" y="15" width="110" height="24" rx="12" fill="#5b5fd6"/>
  <text x="75" y="31" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">ÉTAPE 1 / 3</text>
  <text x="140" y="33" font-size="12" font-weight="600" fill="#535679">Depuis la V1 : bouton "Nouvelle version"</text>
  <rect x="20" y="60" width="860" height="220" rx="10" fill="#fff" stroke="#e1e1ec"/>
  <text x="40" y="90" font-size="14" font-weight="700" fill="#202037">Offre OFF-2026-0042 · V1</text>
  <rect x="330" y="72" width="80" height="26" rx="4" fill="#dbeafe"/>
  <text x="370" y="90" font-size="11" font-weight="700" fill="#1e40af" text-anchor="middle">SENT</text>
  <rect x="670" y="72" width="190" height="36" rx="6" fill="#5b5fd6"/>
  <text x="765" y="95" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">+ Nouvelle version (V2)</text>
  <rect x="40" y="130" width="820" height="120" rx="8" fill="#fefce8"/>
  <text x="60" y="155" font-size="12" font-weight="700" fill="#78350f">Cas typique — le client revient avec des demandes</text>
  <text x="60" y="180" font-size="11" fill="#92400e">• "Peux-tu réduire le prix de la phase 2 ?"</text>
  <text x="60" y="200" font-size="11" fill="#92400e">• "On veut ajouter une phase de recette client"</text>
  <text x="60" y="220" font-size="11" fill="#92400e">• "Décale le démarrage à octobre"</text>
